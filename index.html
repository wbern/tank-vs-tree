<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tank vs The Great Tree</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Courier New',monospace;color:#fff;padding:12px;overflow:hidden;user-select:none}
  h1{font-size:20px;margin-bottom:8px;color:#9f9;text-shadow:2px 2px 0 #000;letter-spacing:3px}
  #wrap{position:relative;border:3px solid #333;box-shadow:0 0 36px rgba(100,200,100,.18)}
  canvas{display:block;background:#87ceeb;image-rendering:pixelated}

  #hud{position:absolute;top:10px;left:10px;font-size:13px;text-shadow:2px 2px 0 #000,-1px -1px 0 #000;pointer-events:none;z-index:5}
  #hud>div{margin-bottom:4px}
  .bar{display:inline-block;width:180px;height:12px;background:#222;border:1px solid #555;vertical-align:middle;position:relative;overflow:hidden;margin-left:4px}
  .bar>div{height:100%;transition:width .15s}
  .hp{background:linear-gradient(90deg,#e33,#f85)}
  .sh{background:linear-gradient(90deg,#4bf,#9cf);position:absolute;top:0;left:0;opacity:.85}

  #treeHud{position:absolute;top:10px;right:10px;font-size:13px;text-shadow:2px 2px 0 #000;text-align:right;display:none;z-index:5}
  #treeHud .bar{width:260px;height:14px;margin-top:4px;display:block}
  #treeHud .bar>div{background:linear-gradient(90deg,#2a6,#7c5);height:100%}

  #shop{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(6,6,12,.97);border:3px solid #ffa500;border-radius:6px;padding:14px 18px;width:560px;max-height:94%;overflow-y:auto;display:none;z-index:10;box-shadow:0 0 40px rgba(255,165,0,.35)}
  #shop h2{color:#ffa500;text-align:center;margin-bottom:4px;font-size:18px;letter-spacing:2px}
  #shop .cc{text-align:center;font-size:14px;margin-bottom:8px;color:#ffa500}
  .cat{color:#8cd;font-size:11px;letter-spacing:2px;margin:10px 2px 4px;border-bottom:1px dashed #334;padding-bottom:3px;font-weight:700}
  .upg{display:flex;align-items:center;padding:5px 6px;border-bottom:1px solid #1a1a24;gap:10px}
  .upg .ic{font-size:18px;width:24px;text-align:center}
  .upg .info{flex:1;min-width:0}
  .upg .n{font-weight:700;color:#ffd27a;font-size:12px}
  .upg .d{font-size:10px;color:#aaa;margin-top:1px}
  .upg .lvl{color:#9cf;font-size:10px;font-weight:700;min-width:46px;text-align:center}
  .upg .c{color:#ffa500;font-weight:700;font-size:11px;min-width:56px;text-align:right}
  .upg button{background:#ffa500;border:0;padding:4px 10px;cursor:pointer;border-radius:3px;font-weight:700;color:#000;font-family:inherit;letter-spacing:1px;font-size:11px;min-width:54px}
  .upg button:hover:not(:disabled){background:#ffb530}
  .upg button:disabled{background:#2a2a2a;color:#666;cursor:not-allowed}
  .upg.maxed{opacity:.55}
  .upg.maxed .n::after{content:' \2713';color:#4f4}
  .upg.locked{opacity:.4}
  #shop .hint{margin-top:8px;text-align:center;font-size:11px;color:#888}

  #msg{position:absolute;top:26%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);padding:10px 22px;border-radius:4px;font-size:16px;text-shadow:2px 2px 0 #000;display:none;z-index:8;border:2px solid #ffa500;pointer-events:none;text-align:center;white-space:nowrap}
  #prompt{position:absolute;bottom:30%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);padding:6px 12px;border-radius:3px;font-size:13px;display:none;z-index:6;pointer-events:none}
  #ctrl{position:absolute;bottom:6px;left:8px;font-size:10px;opacity:.55;pointer-events:none}

  #over,#win{position:absolute;inset:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:20;text-align:center;padding:20px}
  #over h1{color:#f44;font-size:52px;margin-bottom:10px}
  #win h1{color:#9f9;font-size:56px;margin-bottom:10px}
  #over button,#win button{margin-top:16px;padding:10px 28px;font-size:16px;background:#ffa500;color:#000;border:0;cursor:pointer;border-radius:3px;font-family:inherit;font-weight:700;letter-spacing:2px}
  #over button:hover,#win button:hover{background:#ffb530}
</style>
</head>
<body>
<h1>TANK vs THE GREAT TREE</h1>
<div id="wrap">
  <canvas id="cv" width="960" height="540"></canvas>
  <div id="hud">
    <div>HEALTH <span class="bar"><div class="hp" id="hpb" style="width:100%"></div><div class="sh" id="shb" style="width:0"></div></span></div>
    <div>CARROTS <span id="cv1">0</span></div>
    <div>UPGRADES <span id="cv2">0</span>/20</div>
  </div>
  <div id="treeHud">
    THE GREAT TREE
    <div class="bar"><div id="treebar" style="width:100%"></div></div>
  </div>
  <div id="shop">
    <h2>UPGRADE SHOP</h2>
    <div class="cc"><span id="shopC">0</span> carrots</div>
    <div id="upList"></div>
    <div class="hint">[E] to close</div>
  </div>
  <div id="msg"></div>
  <div id="prompt"></div>
  <div id="ctrl">A/D or &larr;&rarr; move &nbsp;|&nbsp; W/Space/&uarr; jump &nbsp;|&nbsp; Mouse aim &nbsp;|&nbsp; Click / X shoot &nbsp;|&nbsp; E shop</div>
  <div id="over">
    <h1>GAME OVER</h1>
    <div>Your tank was destroyed.</div>
    <button onclick="restartGame()">TRY AGAIN</button>
  </div>
  <div id="win">
    <h1>VICTORY!</h1>
    <div>The Great Tree has fallen.</div>
    <div style="margin-top:8px;color:#aaa">Carrots: <span id="fcv">0</span></div>
    <button onclick="restartGame()">PLAY AGAIN</button>
  </div>
</div>
<script>
(() => {
'use strict';

// ===== Constants =====
const W = 960, H = 540, GY = 500, WW = 7600, G = 0.55;

// ===== Upgrades: 20 total (15 scalable with 10 levels + 5 binary) =====
const UPG = [
  // OFFENSE
  { id:'damage',    n:'Bigger Shells',      d:'+25% bullet damage per level',     base:4, max:10, cat:'OFFENSE',  i:'\uD83D\uDCA5' },
  { id:'rate',      n:'Rapid Fire',         d:'+8% fire rate per level',          base:4, max:10, cat:'OFFENSE',  i:'\uD83D\uDD25' },
  { id:'bspeed',    n:'Bullet Velocity',    d:'+10% bullet speed per level',      base:2, max:10, cat:'OFFENSE',  i:'\u2744'  },
  { id:'pierce',    n:'Piercing Rounds',    d:'Bullets pierce +1 enemy per lvl',  base:4, max:10, cat:'OFFENSE',  i:'\u27A1'  },
  { id:'ricochet',  n:'Ricochet',           d:'Bullets bounce +1 time per lvl',   base:4, max:10, cat:'OFFENSE',  i:'\uD83D\uDD04' },
  { id:'crit',      n:'Critical Hits',      d:'+3% crit chance (\u00D73 damage)', base:4, max:10, cat:'OFFENSE',  i:'\uD83C\uDFAF' },
  { id:'multishot', n:'Multi-Shot',         d:'Fire 3 bullets in a spread',       cost:80,  max:1, cat:'OFFENSE',  i:'\uD83C\uDF87' },
  { id:'explosive', n:'Explosive Rounds',   d:'Bullets explode on impact',        cost:110, max:1, cat:'OFFENSE',  i:'\uD83D\uDCA3' },

  // DEFENSE
  { id:'armor',     n:'Armor Plating',      d:'+10 max health per level',         base:3, max:10, cat:'DEFENSE',  i:'\uD83D\uDEE1' },
  { id:'shcap',     n:'Shield Capacity',    d:'+5 max shield per level',          base:3, max:10, cat:'DEFENSE',  i:'\uD83D\uDD35' },
  { id:'shregen',   n:'Shield Regen',       d:'Faster shield recovery per lvl',   base:3, max:10, cat:'DEFENSE',  i:'\uD83D\uDCA0' },
  { id:'hpregen',   n:'Health Regen',       d:'+0.03 HP/frame per level',         base:4, max:10, cat:'DEFENSE',  i:'\u2764'  },
  { id:'lifesteal', n:'Lifesteal',          d:'+1% heal on damage dealt per lvl', base:4, max:10, cat:'DEFENSE',  i:'\uD83E\uDE78' },

  // MOVEMENT
  { id:'speed',     n:'Speed Boost',        d:'+5% movement speed per level',     base:3, max:10, cat:'MOVEMENT', i:'\uD83D\uDCA8' },
  { id:'jump',      n:'Boosted Jump',       d:'+5% jump power per level',         base:3, max:10, cat:'MOVEMENT', i:'\u2B06'  },
  { id:'djump',     n:'Air Jets',           d:'Unlock double jump',               cost:55,  max:1, cat:'MOVEMENT', i:'\uD83D\uDE80' },
  { id:'tjump',     n:'Triple Thrusters',   d:'Triple jump (req. Air Jets)',      cost:120, max:1, cat:'MOVEMENT', i:'\u2708',  req:'djump' },

  // UTILITY
  { id:'magnet',    n:'Carrot Magnet',      d:'+25 magnet range per level',       base:3, max:10, cat:'UTILITY',  i:'\uD83E\uDDF2' },
  { id:'fortune',   n:'Carrot Fortune',     d:'+1 bonus carrot per 2 levels',     base:3, max:10, cat:'UTILITY',  i:'\uD83E\uDD55' },

  // SPECIAL
  { id:'mega',      n:'MEGA CANNON + HOMING MISSILES', d:'Unlock tree-killing shots & 2 homing missiles per shot. REQUIRED!', cost:200, max:1, cat:'SPECIAL',  i:'\u26A1' },
];

// ===== DOM =====
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const hpb = document.getElementById('hpb');
const shb = document.getElementById('shb');
const cv1 = document.getElementById('cv1');
const cv2 = document.getElementById('cv2');
const treeHud = document.getElementById('treeHud');
const treeBarFill = document.getElementById('treebar');
const shopEl = document.getElementById('shop');
const shopC = document.getElementById('shopC');
const upListEl = document.getElementById('upList');
const msgEl = document.getElementById('msg');
const promptEl = document.getElementById('prompt');
const overEl = document.getElementById('over');
const winEl = document.getElementById('win');
const fcvEl = document.getElementById('fcv');

// ===== Input =====
const keys = {};
const mouse = { x: W/2, y: H/2, wx: 0, wy: 0, d: false };

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyE') toggleShopAtZone();
  if (['Space','ArrowUp','KeyW'].includes(e.code)) { doJump(); e.preventDefault(); }
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  if (e.code === 'KeyX') tryShoot();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

cv.addEventListener('mousemove', e => {
  const r = cv.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top) * (H / r.height);
});
cv.addEventListener('mousedown', e => { mouse.d = true; tryShoot(); });
cv.addEventListener('mouseup', () => { mouse.d = false; });
cv.addEventListener('mouseleave', () => { mouse.d = false; });
cv.addEventListener('contextmenu', e => e.preventDefault());

// ===== Game State =====
let player, plats, carrots, enemies, enemySpawns, bullets, particles, floats, tree, camera, gameState, msgTimer, shopOpen, shake, shopZone, nearShop, t, explosions;

function init() {
  player = {
    x: 120, y: 430, w: 56, h: 30,
    vx: 0, vy: 0, og: false, ju: 0,
    f: 1, ta: 0,
    sc: 0, inv: 0, hf: 0,
    hp: 100,
    sh: 0, srt: 0,
    cr: 0, up: {}, dead: false,
  };
  bullets = [];
  particles = [];
  floats = [];
  explosions = [];
  plats = buildPlats();
  carrots = buildCarrots();
  enemySpawns = buildSpawns();
  enemies = enemySpawns.map(spawnE);
  tree = { x: 7150, y: 140, w: 200, h: 360, hp: 800, mhp: 800, hf: 0, dead: false, fallT: 0, breathT: 0 };
  camera = { x: 0, y: 0 };
  shopZone = { x: 330, y: 400, w: 80, h: 100 };
  gameState = 'playing';
  msgTimer = 0;
  shopOpen = false;
  shake = 0;
  nearShop = false;
  t = 0;
  hideShop();
  overEl.style.display = 'none';
  winEl.style.display = 'none';
  treeHud.style.display = 'none';
  updateHUD();
  showMessage('Collect carrots and buy upgrades at the SHOP!', 200);
}

// ===== Upgrade helpers =====
function upLevel(id) { return player.up[id] || 0; }
function upCost(u, lvl) {
  if (u.max === 1) return u.cost;
  return Math.ceil(u.base * (lvl + 1));
}
function upMaxed(u) { return upLevel(u.id) >= u.max; }
function upLocked(u) { return u.req && !upLevel(u.req); }
function upCanBuy(u) {
  if (upMaxed(u) || upLocked(u)) return false;
  return player.cr >= upCost(u, upLevel(u.id));
}
function uniqueUpgrades() {
  let n = 0;
  for (const u of UPG) if (upLevel(u.id) > 0) n++;
  return n;
}

// ===== Derived stats =====
function maxHP()        { return 100 + upLevel('armor') * 10; }
function maxShield()    { return upLevel('shcap') * 5; }
function maxSpeed()     { return 3.1 * (1 + upLevel('speed') * 0.05); }
function jumpPower()    { return 10.5 * (1 + upLevel('jump') * 0.05); }
function maxJumps()     { return upLevel('tjump') ? 3 : (upLevel('djump') ? 2 : 1); }
function fireCooldown() {
  const hasMega = upLevel('mega') > 0;
  const base = hasMega ? 46 : 26;
  return Math.max(5, Math.floor(base / (1 + upLevel('rate') * 0.08)));
}
function bulletSpd()    { return 10 * (1 + upLevel('bspeed') * 0.1); }
function bulletDmg()    {
  let d = 5 * (1 + upLevel('damage') * 0.25);
  if (upLevel('mega')) d = Math.max(d * 1.4, 45);
  return d;
}
function critChance()   { return upLevel('crit') * 0.03; }
function lifestealPct() { return upLevel('lifesteal') * 0.01; }
function magnetRange()  { const l = upLevel('magnet'); return l ? 40 + l * 25 : 0; }
function hpRegenPer()   { return upLevel('hpregen') * 0.03; }
function shieldRegenPer() { return 0.15 + upLevel('shregen') * 0.05; }
function fortuneBonus() { return Math.floor(upLevel('fortune') / 2); }

// ===== World =====
function buildPlats() {
  const p = [];
  p.push({ x:   0, y: GY, w:  900, h: 60, t:'g' });
  p.push({ x:1000, y: GY, w:  550, h: 60, t:'g' });
  p.push({ x:1650, y: GY, w:  900, h: 60, t:'g' });
  p.push({ x:2700, y: GY, w:  650, h: 60, t:'g' });
  p.push({ x:3450, y: GY, w: 1200, h: 60, t:'g' });
  p.push({ x:4750, y: GY, w:  450, h: 60, t:'g' });
  p.push({ x:5350, y: GY, w:  500, h: 60, t:'g' });
  p.push({ x:6000, y: GY, w:  550, h: 60, t:'g' });
  p.push({ x:6700, y: GY, w:  900, h: 60, t:'g' });

  p.push({ x:500, y:400, w:120, h:16, t:'w' });
  p.push({ x:680, y:320, w:120, h:16, t:'w' });

  p.push({ x:1050, y:400, w:100, h:16, t:'w' });
  p.push({ x:1230, y:340, w:100, h:16, t:'w' });
  p.push({ x:1430, y:280, w:100, h:16, t:'w' });

  p.push({ x:1720, y:400, w:120, h:16, t:'w' });
  p.push({ x:1910, y:330, w:120, h:16, t:'w' });
  p.push({ x:2110, y:260, w:120, h:16, t:'w' });
  p.push({ x:2310, y:190, w:120, h:16, t:'w' });

  p.push({ x:2580, y:430, w:80,  h:16, t:'w' });

  p.push({ x:2800, y:390, w:130, h:16, t:'w' });
  p.push({ x:3010, y:310, w:130, h:16, t:'w' });
  p.push({ x:3220, y:230, w:130, h:16, t:'w' });

  p.push({ x:3380, y:440, w:70,  h:16, t:'w' });

  p.push({ x:3560, y:400, w:130, h:16, t:'w' });
  p.push({ x:3770, y:330, w:130, h:16, t:'w' });
  p.push({ x:3970, y:260, w:130, h:16, t:'w' });
  p.push({ x:4170, y:190, w:120, h:16, t:'w' });
  p.push({ x:4370, y:120, w:110, h:16, t:'w' });
  p.push({ x:4520, y:210, w:120, h:16, t:'w' });

  p.push({ x:4830, y:430, w:120, h:30, t:'r' });
  p.push({ x:4990, y:370, w:130, h:30, t:'r' });

  p.push({ x:5230, y:440, w:70,  h:16, t:'w' });

  p.push({ x:5400, y:390, w:120, h:16, t:'w' });
  p.push({ x:5580, y:320, w:120, h:16, t:'w' });
  p.push({ x:5760, y:250, w:120, h:16, t:'w' });

  p.push({ x:5890, y:440, w:70,  h:16, t:'w' });

  p.push({ x:6050, y:390, w:100, h:16, t:'w' });
  p.push({ x:6210, y:320, w:100, h:16, t:'w' });
  p.push({ x:6380, y:250, w:100, h:16, t:'w' });

  p.push({ x:6590, y:440, w:70,  h:16, t:'w' });

  p.push({ x:6770, y:400, w:130, h:16, t:'w' });
  p.push({ x:6980, y:330, w:130, h:16, t:'w' });
  p.push({ x:7180, y:260, w:120, h:16, t:'w' });

  return p;
}

function buildCarrots() {
  const c = [];
  const cl = (x, y, n, sp = 28) => { for (let i = 0; i < n; i++) c.push({ x: x + (i - (n-1)/2) * sp, y, g:false, t: Math.random()*Math.PI*2 }); };
  cl(220, GY - 26, 4); cl(440, GY - 26, 3);
  cl(560, 370, 3, 26); cl(740, 290, 3, 26);
  cl(1100, 370, 3, 26); cl(1280, 310, 3, 26); cl(1480, 250, 3, 26);
  cl(1780, GY - 26, 4, 30); cl(1980, GY - 26, 4, 30); cl(2180, GY - 26, 4, 30);
  cl(1770, 370, 3); cl(1960, 300, 3); cl(2160, 230, 3); cl(2360, 160, 4);
  cl(2620, 400, 2);
  cl(2800, GY - 26, 4, 30); cl(3000, GY - 26, 4, 30); cl(3200, GY - 26, 4, 30);
  cl(2860, 360, 3); cl(3070, 280, 3); cl(3280, 200, 4);
  cl(3420, 410, 2);
  cl(3500, GY - 26, 4, 30); cl(3700, GY - 26, 4, 30); cl(3900, GY - 26, 4, 30);
  cl(4100, GY - 26, 4, 30); cl(4300, GY - 26, 4, 30); cl(4500, GY - 26, 4, 30);
  cl(3620, 370, 3); cl(3830, 300, 3); cl(4030, 230, 3); cl(4230, 160, 3);
  cl(4425, 90, 5, 24); cl(4580, 180, 3);
  cl(4890, 400, 2); cl(5055, 340, 3);
  cl(5270, 410, 2);
  cl(5460, 360, 3); cl(5640, 290, 3); cl(5820, 220, 4);
  cl(5925, 410, 2);
  cl(6100, 360, 3); cl(6270, 290, 3); cl(6440, 220, 4);
  cl(6625, 410, 2);
  cl(6830, 370, 3); cl(7040, 300, 3); cl(7240, 230, 4);
  cl(6850, GY - 26, 4, 30); cl(7100, GY - 26, 4, 30);
  return c;
}

function buildSpawns() {
  return [
    { x:1770, y:470, t:'wolf' }, { x:1980, y:470, t:'wolf' }, { x:2180, y:470, t:'wolf' },
    { x:2800, y:470, t:'wolf' }, { x:3000, y:470, t:'wolf' }, { x:3200, y:470, t:'wolf' },
    { x:3600, y:470, t:'wolf' }, { x:3820, y:470, t:'wolf' }, { x:4040, y:470, t:'wolf' },
    { x:4260, y:470, t:'wolf' }, { x:4480, y:470, t:'wolf' },
    { x:4900, y:400, t:'wolf' }, { x:5080, y:340, t:'wolf' },
    { x:6120, y:470, t:'wolf' }, { x:6320, y:470, t:'wolf' },
    { x:6850, y:470, t:'wolf' }, { x:7050, y:470, t:'wolf' }, { x:7220, y:470, t:'wolf' },
    { x:4200, y:180, t:'bat' }, { x:4400, y:130, t:'bat' }, { x:5800, y:200, t:'bat' },
    { x:6300, y:220, t:'bat' }, { x:6900, y:200, t:'bat' }, { x:7150, y:180, t:'bat' },
  ];
}

function spawnE(sp) {
  const b = { sx: sp.x, sy: sp.y, x: sp.x, y: sp.y, vx: 0, vy: 0, t: sp.t, hf: 0, dead: false, respawn: 0, phaseT: 90 };
  if (sp.t === 'wolf') {
    return Object.assign(b, { w: 42, h: 28, mh: 30, hp: 30, dmg: 14, sp: 1.8, cr: 3, f: -1, og: false });
  }
  if (sp.t === 'bat') {
    return Object.assign(b, { w: 32, h: 22, mh: 15, hp: 15, dmg: 8, sp: 2.2, cr: 2, ay: sp.y, os: Math.random() * Math.PI * 2, fly: true, f: -1 });
  }
  return b;
}

// ===== Gameplay Logic =====
function doJump() {
  if (gameState !== 'playing' || shopOpen || player.dead) return;
  if (player.ju < maxJumps()) {
    player.vy = -jumpPower();
    player.ju++;
    player.og = false;
    if (player.ju >= 2) {
      const color = player.ju === 3 ? '#44ddff' : '#ffc040';
      for (let i = 0; i < 12; i++) {
        particles.push({
          x: player.x + player.w/2 + (Math.random()-0.5)*22,
          y: player.y + player.h,
          vx: (Math.random()-0.5)*3.5,
          vy: Math.random()*3 + 1,
          life: 20 + Math.random()*10,
          color,
          size: 3 + Math.random()*2,
          g: 0.04,
        });
      }
    }
  }
}

function tryShoot() {
  if (gameState !== 'playing' || shopOpen || player.dead) return;
  if (player.sc > 0) return;
  const hasMega  = upLevel('mega') > 0;
  const hasMulti = upLevel('multishot') > 0;
  player.sc = fireCooldown();

  const cx = player.x + player.w/2;
  const cy = player.y + player.h/2 - 10;
  const ang = player.ta;
  const cannonLen = hasMega ? 46 : (24 + Math.min(12, upLevel('damage') * 1.2));
  const sx = cx + Math.cos(ang) * cannonLen;
  const sy = cy + Math.sin(ang) * cannonLen;

  const angles = hasMulti ? [-0.18, 0, 0.18] : [0];
  for (const off of angles) spawnBullet(sx, sy, ang + off, hasMega, false);

  if (hasMega) {
    // Homing missiles (2) from cannon sides
    spawnBullet(sx, sy, ang - 0.55, false, true);
    spawnBullet(sx, sy, ang + 0.55, false, true);
  }

  // Muzzle flash
  const flashN = hasMega ? 16 : (hasMulti ? 10 : 7);
  for (let i = 0; i < flashN; i++) {
    particles.push({
      x: sx, y: sy,
      vx: Math.cos(ang) * (3 + Math.random()*3) + (Math.random()-0.5)*2,
      vy: Math.sin(ang) * (3 + Math.random()*3) + (Math.random()-0.5)*2,
      life: 7 + Math.random()*8,
      color: hasMega ? '#fff080' : '#ffc144',
      size: hasMega ? 5 : 2.5,
      g: 0,
    });
  }
  player.vx -= Math.cos(ang) * (hasMega ? 2.8 : 0.6);
  if (hasMega) shake = Math.max(shake, 6);
}

function spawnBullet(x, y, ang, mega, homing) {
  const baseSpd = homing ? 5.5 : bulletSpd() * (mega ? 1.3 : 1);
  let dmg = bulletDmg();
  if (homing) dmg = Math.max(18, dmg * 0.55);
  const isCrit = Math.random() < critChance();
  if (isCrit) dmg *= 3;
  bullets.push({
    x, y,
    vx: Math.cos(ang) * baseSpd,
    vy: Math.sin(ang) * baseSpd,
    spd: baseSpd,
    life: homing ? 180 : 80,
    dmg,
    pierceLeft: upLevel('pierce'),
    bouncesLeft: upLevel('ricochet'),
    exploding: upLevel('explosive') > 0,
    mega, homing,
    crit: isCrit,
    hit: new Set(),
    age: 0,
  });
}

function takeDamage(amount) {
  if (player.inv > 0 || player.dead) return;
  if (player.sh > 0) {
    const ab = Math.min(player.sh, amount);
    player.sh -= ab;
    amount -= ab;
    player.srt = 120;
  }
  if (amount > 0) {
    player.hp -= amount;
    player.hf = 10;
  }
  player.inv = 35;
  shake = Math.max(shake, 4);
  if (player.hp <= 0) {
    player.hp = 0;
    player.dead = true;
    gameState = 'gameover';
    overEl.style.display = 'flex';
    for (let i = 0; i < 50; i++) {
      particles.push({
        x: player.x + player.w/2, y: player.y + player.h/2,
        vx: (Math.random()-0.5) * 10, vy: (Math.random()-0.5) * 10 - 2,
        life: 40 + Math.random()*30,
        color: ['#ff4400','#ffaa00','#444','#888'][Math.floor(Math.random()*4)],
        size: 3 + Math.random()*4, g: 0.2,
      });
    }
  }
}

function collectCarrot(c) {
  c.g = true;
  const gain = 1 + fortuneBonus();
  player.cr += gain;
  for (let i = 0; i < 5 + fortuneBonus(); i++) {
    particles.push({ x: c.x, y: c.y, vx:(Math.random()-0.5)*3, vy:-Math.random()*2-1, life:20, color:'#ff9022', size:2, g:0.2 });
  }
  if (fortuneBonus() > 0) spawnFloat(c.x, c.y - 10, '+' + gain, '#ff9022');
  updateHUD();
}

function killEnemy(e) {
  e.dead = true;
  e.respawn = 240;
  for (let k = 0; k < e.cr; k++) {
    carrots.push({
      x: e.x + e.w/2 + (Math.random()-0.5)*20, y: e.y, g:false,
      vx: (Math.random()-0.5)*3, vy: -Math.random()*3 - 2,
      drop: true, t: Math.random()*Math.PI*2,
    });
  }
  for (let k = 0; k < 14; k++) {
    particles.push({ x: e.x + e.w/2, y: e.y + e.h/2, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6-1, life: 25 + Math.random()*15, color: Math.random()<.5?'#883':'#555', size: 3, g: 0.15 });
  }
}

function explode(x, y, damage, radius, mega) {
  explosions.push({ x, y, r: 2, mr: radius, life: 25, dmg: damage });
  for (let i = 0; i < 30; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8,
      life: 20 + Math.random()*15,
      color: ['#ff4400','#ffaa00','#ffee44'][Math.floor(Math.random()*3)],
      size: 3 + Math.random()*4, g: 0.1,
    });
  }
  shake = Math.max(shake, 5);
  // Damage enemies in radius
  for (const e of enemies) {
    if (e.dead || e.phaseT > 0) continue;
    const d = Math.hypot(e.x + e.w/2 - x, e.y + e.h/2 - y);
    if (d < radius) {
      e.hp -= damage * 0.75;
      e.hf = 8;
      if (e.hp <= 0) killEnemy(e);
    }
  }
  if (mega && !tree.dead) {
    const d = Math.hypot(tree.x + tree.w/2 - x, tree.y + tree.h/2 - y);
    if (d < radius + 60) damageTree(damage * 0.5);
  }
}

function damageTree(dmg) {
  tree.hp -= dmg;
  tree.hf = 10;
  shake = Math.max(shake, 4);
  treeHud.style.display = 'block';
  treeBarFill.style.width = Math.max(0, tree.hp / tree.mhp * 100) + '%';
  if (tree.hp <= 0) {
    tree.hp = 0;
    tree.dead = true;
    tree.fallT = 1;
    shake = 20;
    for (let k = 0; k < 80; k++) {
      particles.push({
        x: tree.x + tree.w/2 + (Math.random()-0.5)*tree.w,
        y: tree.y + (Math.random()*tree.h),
        vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*4 - 2,
        life: 60 + Math.random()*40,
        color: Math.random()<.5?'#8b4513':'#4a7c3a',
        size: 4 + Math.random()*3, g: 0.15,
      });
    }
    setTimeout(() => {
      gameState = 'won';
      winEl.style.display = 'flex';
      fcvEl.textContent = player.cr;
    }, 2200);
  }
}

function spawnFloat(x, y, text, color) {
  floats.push({ x, y, text, color, life: 40 });
}

// ===== Updates =====
function update() {
  if (gameState !== 'playing') return;
  t++;
  if (shopOpen) return;

  updatePlayer();
  updateBullets();
  updateExplosions();
  updateEnemies();
  updateCarrots();
  updateTree();
  updateParticles();
  updateFloats();
  updateCamera();
  updateShopZone();
  updateMessage();
  if (shake > 0.1) shake *= 0.85; else shake = 0;
}

function updatePlayer() {
  const p = player;
  if (p.dead) return;

  const ms = maxSpeed();
  const accel = 0.55;
  let h = 0;
  if (keys['KeyA'] || keys['ArrowLeft']) h -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) h += 1;
  if (h !== 0) {
    p.vx += h * accel;
    p.vx = Math.max(-ms, Math.min(ms, p.vx));
    p.f = h;
  } else {
    p.vx *= p.og ? 0.82 : 0.94;
    if (Math.abs(p.vx) < 0.05) p.vx = 0;
  }
  p.vy += G;
  if (p.vy > 16) p.vy = 16;
  p.x += p.vx; resolveX(p);
  p.y += p.vy; resolveY(p);

  if (p.x < 0) { p.x = 0; p.vx = 0; }
  if (p.x + p.w > WW) { p.x = WW - p.w; p.vx = 0; }

  if (p.y > H + 200) {
    takeDamage(25);
    if (!p.dead) { p.x = 160; p.y = 420; p.vx = 0; p.vy = 0; p.inv = 60; }
  }

  if (p.sc > 0) p.sc--;
  if (mouse.d && p.sc === 0) tryShoot();

  const cx = p.x + p.w/2, cy = p.y + p.h/2 - 10;
  p.ta = Math.atan2(mouse.wy - cy, mouse.wx - cx);

  if (p.inv > 0) p.inv--;
  if (p.hf > 0) p.hf--;

  // Shield regen
  const mSh = maxShield();
  if (p.sh > mSh) p.sh = mSh;
  if (mSh > 0) {
    if (p.srt > 0) p.srt--;
    else if (p.sh < mSh) p.sh = Math.min(mSh, p.sh + shieldRegenPer());
  }
  // Health regen
  const mHp = maxHP();
  if (p.hp > mHp) p.hp = mHp;
  if (hpRegenPer() > 0 && p.hp < mHp) {
    p.hp = Math.min(mHp, p.hp + hpRegenPer());
  }
  updateHUD();
}

function resolveX(p) {
  for (const pl of plats) {
    if (rectHit(p, pl)) {
      if (p.vx > 0) p.x = pl.x - p.w;
      else if (p.vx < 0) p.x = pl.x + pl.w;
      p.vx = 0;
    }
  }
}
function resolveY(p) {
  p.og = false;
  for (const pl of plats) {
    if (rectHit(p, pl)) {
      if (p.vy > 0) { p.y = pl.y - p.h; p.og = true; p.ju = 0; }
      else if (p.vy < 0) { p.y = pl.y + pl.h; }
      p.vy = 0;
    }
  }
}
function rectHit(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.age++;

    if (b.homing) updateHoming(b);

    const px = b.x, py = b.y;
    b.x += b.vx; b.y += b.vy;
    b.life--;

    let ended = false;

    // Platform collisions
    let hitPlat = null;
    for (const pl of plats) {
      if (b.x > pl.x && b.x < pl.x + pl.w && b.y > pl.y && b.y < pl.y + pl.h) {
        hitPlat = pl; break;
      }
    }
    if (hitPlat) {
      if (b.bouncesLeft > 0) {
        // resolve axis
        const wasOutX = px < hitPlat.x || px > hitPlat.x + hitPlat.w;
        if (wasOutX) { b.vx = -b.vx; b.x = px + b.vx; }
        else { b.vy = -b.vy; b.y = py + b.vy; }
        b.bouncesLeft--;
        for (let k = 0; k < 4; k++) {
          particles.push({ x: b.x, y: b.y, vx:(Math.random()-0.5)*3, vy:(Math.random()-0.5)*3, life: 10, color:'#fff', size: 2, g:0 });
        }
      } else {
        if (b.exploding) explode(b.x, b.y, b.dmg, 60, b.mega);
        ended = true;
      }
    }

    // Enemy collisions
    if (!ended) {
      for (const e of enemies) {
        if (e.dead || e.phaseT > 0) continue;
        if (b.hit.has(e)) continue;
        if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
          e.hp -= b.dmg;
          e.hf = 8;
          b.hit.add(e);
          // Lifesteal
          const heal = b.dmg * lifestealPct();
          if (heal > 0) {
            player.hp = Math.min(maxHP(), player.hp + heal);
            if (heal >= 1) spawnFloat(player.x + player.w/2, player.y - 6, '+' + Math.round(heal), '#ff5577');
          }
          // Hit feedback
          if (b.crit) {
            for (let k = 0; k < 10; k++) particles.push({ x: b.x, y: b.y, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6, life:22, color:'#ff3377', size:3, g:0 });
            spawnFloat(b.x, b.y, 'CRIT!', '#ff4488');
          } else {
            for (let k = 0; k < 4; k++) particles.push({ x: b.x, y: b.y, vx:(Math.random()-0.5)*3, vy:(Math.random()-0.5)*3, life:12, color:'#fff', size:2, g:0 });
          }
          if (e.hp <= 0) killEnemy(e);
          if (b.pierceLeft > 0) { b.pierceLeft--; }
          else {
            if (b.exploding) explode(b.x, b.y, b.dmg, 60, b.mega);
            ended = true;
          }
          break;
        }
      }
    }

    // Tree
    if (!ended && !tree.dead && b.x > tree.x && b.x < tree.x + tree.w && b.y > tree.y && b.y < tree.y + tree.h) {
      if (b.mega || b.homing) {
        damageTree(b.dmg);
        for (let k = 0; k < 14; k++) {
          particles.push({ x: b.x, y: b.y, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, life:25, color:Math.random()<.5?'#8b4513':'#4a7c3a', size:3, g:0.1 });
        }
      } else {
        for (let k = 0; k < 6; k++) particles.push({ x: b.x, y: b.y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, life:18, color:'#fff', size:2, g:0 });
        showMessage('NOT POWERFUL ENOUGH! You need the MEGA CANNON!', 120);
      }
      if (b.exploding) explode(b.x, b.y, b.dmg, 60, b.mega);
      ended = true;
    }

    if (ended || b.life <= 0 || b.x < -200 || b.x > WW + 200 || b.y > H + 400) {
      bullets.splice(i, 1);
    }
  }
}

function updateHoming(m) {
  let best = null, bestD = Infinity;
  for (const e of enemies) {
    if (e.dead || e.phaseT > 0) continue;
    const ex = e.x + e.w/2, ey = e.y + e.h/2;
    const d = Math.hypot(ex - m.x, ey - m.y);
    if (d < bestD) { bestD = d; best = { x: ex, y: ey }; }
  }
  if (!tree.dead) {
    const tcx = tree.x + tree.w/2, tcy = tree.y + tree.h/2;
    const d = Math.hypot(tcx - m.x, tcy - m.y);
    if (d < bestD) { bestD = d; best = { x: tcx, y: tcy }; }
  }
  const spd = Math.min(m.spd * (1 + m.age * 0.006), 12);
  if (best) {
    const wantAng = Math.atan2(best.y - m.y, best.x - m.x);
    const curAng = Math.atan2(m.vy, m.vx);
    let diff = wantAng - curAng;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    const turn = 0.1;
    const newAng = curAng + Math.max(-turn, Math.min(turn, diff));
    m.vx = Math.cos(newAng) * spd;
    m.vy = Math.sin(newAng) * spd;
  } else {
    const curAng = Math.atan2(m.vy, m.vx);
    m.vx = Math.cos(curAng) * spd;
    m.vy = Math.sin(curAng) * spd;
  }
  if (t % 2 === 0) {
    const ang = Math.atan2(m.vy, m.vx) + Math.PI;
    particles.push({
      x: m.x + Math.cos(ang) * 6,
      y: m.y + Math.sin(ang) * 6,
      vx: Math.cos(ang) * 1.5 + (Math.random()-0.5),
      vy: Math.sin(ang) * 1.5 + (Math.random()-0.5),
      life: 22, color: Math.random()<.5?'#ff5500':'#ffcc00', size: 3, g: 0,
    });
  }
}

function updateExplosions() {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const e = explosions[i];
    e.life--;
    e.r += (e.mr - e.r) * 0.3;
    if (e.life <= 0) explosions.splice(i, 1);
  }
}

function updateEnemies() {
  for (const e of enemies) {
    if (e.dead) {
      e.respawn--;
      if (e.respawn <= 0) {
        e.dead = false;
        e.x = e.sx; e.y = e.sy;
        e.hp = e.mh; e.vx = 0; e.vy = 0;
        e.phaseT = 90;
      }
      continue;
    }
    if (e.phaseT > 0) {
      e.phaseT--;
      if (t % 3 === 0) {
        const r = 34;
        const a = Math.random() * Math.PI * 2;
        particles.push({
          x: e.x + e.w/2 + Math.cos(a) * r,
          y: e.y + e.h/2 + Math.sin(a) * r,
          vx: -Math.cos(a) * 2.2,
          vy: -Math.sin(a) * 2.2,
          life: 18,
          color: e.t === 'bat' ? '#aa44cc' : '#cc4488',
          size: 3, g: 0,
        });
      }
      continue;
    }
    if (e.hf > 0) e.hf--;

    const p = player;
    const dx = (p.x + p.w/2) - (e.x + e.w/2);
    const dy = (p.y + p.h/2) - (e.y + e.h/2);
    const dist = Math.hypot(dx, dy);

    if (e.t === 'wolf') {
      if (dist < 420 && !p.dead) {
        const dir = Math.sign(dx);
        e.vx += dir * 0.15;
        e.vx = Math.max(-e.sp, Math.min(e.sp, e.vx));
        e.f = dir;
      } else {
        e.vx *= 0.9;
      }
      e.vy += G;
      if (e.vy > 14) e.vy = 14;
      e.x += e.vx; resolveEnemyX(e);
      e.y += e.vy; resolveEnemyY(e);
      if (!p.dead && rectHit(e, p)) {
        takeDamage(e.dmg);
        p.vx = (p.x + p.w/2 < e.x + e.w/2 ? -6 : 6);
        p.vy = -5;
      }
      if (e.y > H + 200) killEnemy(e);
    } else if (e.t === 'bat') {
      e.os += 0.06;
      if (dist < 400 && !p.dead) {
        e.vx += Math.sign(dx) * 0.1;
        e.vy += Math.sign(dy) * 0.08;
      } else {
        e.vx += Math.sign(e.sx - e.x) * 0.05;
        e.vy += Math.sign(e.ay - e.y) * 0.05;
      }
      e.vx = Math.max(-e.sp, Math.min(e.sp, e.vx));
      e.vy = Math.max(-e.sp, Math.min(e.sp, e.vy));
      e.vx *= 0.96; e.vy *= 0.96;
      e.x += e.vx + Math.sin(e.os) * 0.3;
      e.y += e.vy + Math.cos(e.os) * 0.4;
      e.f = dx < 0 ? -1 : 1;
      if (!p.dead && rectHit(e, p)) {
        takeDamage(e.dmg);
        e.vx = -Math.sign(dx) * 3;
        e.vy = -2;
      }
    }
  }
}

function resolveEnemyX(e) {
  for (const pl of plats) {
    if (rectHit(e, pl)) {
      if (e.vx > 0) e.x = pl.x - e.w;
      else if (e.vx < 0) e.x = pl.x + pl.w;
      e.vx = -e.vx * 0.2;
    }
  }
}
function resolveEnemyY(e) {
  e.og = false;
  for (const pl of plats) {
    if (rectHit(e, pl)) {
      if (e.vy > 0) { e.y = pl.y - e.h; e.og = true; }
      else if (e.vy < 0) e.y = pl.y + pl.h;
      e.vy = 0;
    }
  }
}

function updateCarrots() {
  const mR = magnetRange();
  for (const c of carrots) {
    if (c.g) continue;
    c.t = (c.t || 0) + 0.08;
    if (c.drop) {
      c.vy = (c.vy || 0) + G * 0.5;
      c.x += c.vx || 0; c.y += c.vy;
      for (const pl of plats) {
        if (c.x > pl.x && c.x < pl.x + pl.w && c.y > pl.y - 4 && c.y < pl.y + 10) {
          c.y = pl.y - 4; c.vx = 0; c.vy = 0; c.drop = false; break;
        }
      }
      if (c.y > H + 200) { c.g = true; continue; }
      if (c.vx) c.vx *= 0.94;
    }
    const pcx = player.x + player.w/2, pcy = player.y + player.h/2;
    const dx = c.x - pcx, dy = c.y - pcy;
    const d = Math.hypot(dx, dy);
    if (mR > 0 && d < mR) {
      const pull = Math.min(2.5, 0.6 + (1 - d / mR) * 1.5);
      const ang = Math.atan2(-dy, -dx);
      c.x += Math.cos(ang) * pull;
      c.y += Math.sin(ang) * pull;
    }
    if (d < 26) collectCarrot(c);
  }
}

function updateTree() {
  if (tree.hf > 0) tree.hf--;
  tree.breathT += 0.03;
  if (tree.dead) {
    tree.fallT++;
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    if (p.g) p.vy += p.g;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updateFloats() {
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i];
    f.y -= 0.8;
    f.life--;
    if (f.life <= 0) floats.splice(i, 1);
  }
}

function updateCamera() {
  const tx = player.x + player.w/2 - W/2;
  camera.x += (tx - camera.x) * 0.1;
  camera.x = Math.max(0, Math.min(WW - W, camera.x));
  camera.y = 0;
}

function updateShopZone() {
  const p = player;
  const near = p.x + p.w > shopZone.x - 40 && p.x < shopZone.x + shopZone.w + 40 && p.y + p.h > shopZone.y - 40;
  nearShop = near;
  if (near && !shopOpen) {
    promptEl.textContent = '[E] Open Shop';
    promptEl.style.display = 'block';
  } else if (!shopOpen) {
    promptEl.style.display = 'none';
  }
}

function updateMessage() {
  if (msgTimer > 0) {
    msgTimer--;
    if (msgTimer === 0) msgEl.style.display = 'none';
  }
}

function showMessage(text, duration = 180) {
  msgEl.textContent = text;
  msgEl.style.display = 'block';
  msgTimer = duration;
}

// ===== Shop =====
function toggleShopAtZone() {
  if (gameState !== 'playing') return;
  if (shopOpen) { hideShop(); return; }
  if (!nearShop) return;
  openShop();
}
function openShop() {
  shopOpen = true;
  renderShop();
  shopEl.style.display = 'block';
  promptEl.style.display = 'none';
}
function hideShop() {
  shopOpen = false;
  shopEl.style.display = 'none';
}
function renderShop() {
  upListEl.innerHTML = '';
  shopC.textContent = player.cr;
  let lastCat = '';
  for (const u of UPG) {
    if (u.cat !== lastCat) {
      const h = document.createElement('div');
      h.className = 'cat';
      h.textContent = u.cat;
      upListEl.appendChild(h);
      lastCat = u.cat;
    }
    const lvl = upLevel(u.id);
    const maxed = upMaxed(u);
    const locked = upLocked(u);
    const affordable = upCanBuy(u);
    const row = document.createElement('div');
    row.className = 'upg' + (maxed ? ' maxed' : '') + (locked ? ' locked' : '');
    const lvlDisp = u.max === 1 ? (lvl ? 'OWNED' : 'N/A') : `Lv ${lvl}/${u.max}`;
    const costDisp = maxed ? (u.max === 1 ? '' : 'MAX') : (locked ? 'LOCKED' : upCost(u, lvl) + ' \u{1F955}');
    row.innerHTML = `
      <div class="ic">${u.i}</div>
      <div class="info">
        <div class="n">${u.n}</div>
        <div class="d">${u.d}</div>
      </div>
      <div class="lvl">${lvlDisp}</div>
      <div class="c">${costDisp}</div>
    `;
    const btn = document.createElement('button');
    if (maxed) { btn.textContent = u.max === 1 ? 'OWNED' : 'MAX'; btn.disabled = true; }
    else if (locked) { btn.textContent = 'LOCKED'; btn.disabled = true; }
    else { btn.textContent = 'BUY'; btn.disabled = !affordable; }
    btn.onclick = () => buyUpgrade(u.id);
    row.appendChild(btn);
    upListEl.appendChild(row);
  }
}
function buyUpgrade(id) {
  const u = UPG.find(x => x.id === id);
  if (!u) return;
  if (!upCanBuy(u)) return;
  const lvl = upLevel(u.id);
  player.cr -= upCost(u, lvl);
  player.up[id] = lvl + 1;
  // side-effects
  if (id === 'armor') player.hp = Math.min(maxHP(), player.hp + 10);
  if (id === 'shcap') player.sh = maxShield();
  if (id === 'mega') showMessage('MEGA CANNON + HOMING MISSILES ACQUIRED!', 220);
  else if (u.max === 1) showMessage(u.n + ' acquired!', 130);
  else showMessage(u.n + ' Lv ' + (lvl + 1) + '!', 100);
  renderShop();
  updateHUD();
}

// ===== HUD =====
function updateHUD() {
  const mHp = maxHP();
  hpb.style.width = Math.max(0, player.hp / mHp * 100) + '%';
  const mSh = maxShield();
  shb.style.width = mSh > 0 ? (player.sh / mHp * 100) + '%' : '0%';
  cv1.textContent = player.cr;
  cv2.textContent = uniqueUpgrades();
}

// ===== Rendering =====
function render() {
  ctx.save();
  let sx = 0, sy = 0;
  if (shake > 0.2) { sx = (Math.random()-0.5) * shake; sy = (Math.random()-0.5) * shake; }
  drawSky();
  ctx.translate(-camera.x + sx, -camera.y + sy);

  mouse.wx = mouse.x + camera.x - sx;
  mouse.wy = mouse.y + camera.y - sy;

  drawBackground();
  drawPlatforms();
  drawShopFlag();
  drawTree();
  drawCarrots();
  drawEnemies();
  drawBullets();
  drawExplosions();
  drawPlayer();
  drawParticles();
  drawFloats();

  ctx.restore();

  drawVignette();
  drawMiniHints();
}

function drawSky() {
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#70a8e6');
  grd.addColorStop(0.6, '#b8dcf0');
  grd.addColorStop(1, '#dcecc8');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

function drawBackground() {
  const pax = camera.x * 0.3;
  ctx.fillStyle = '#6a8a9a';
  ctx.beginPath();
  for (let x = -100; x < WW + 100; x += 200) {
    const xx = x - pax;
    ctx.moveTo(xx, GY);
    ctx.lineTo(xx + 100, GY - 150);
    ctx.lineTo(xx + 200, GY);
  }
  ctx.fill();

  const pax2 = camera.x * 0.5;
  ctx.fillStyle = '#547a52';
  ctx.beginPath();
  for (let x = -150; x < WW + 150; x += 320) {
    const xx = x - pax2;
    ctx.moveTo(xx, GY);
    ctx.lineTo(xx + 160, GY - 90);
    ctx.lineTo(xx + 320, GY);
  }
  ctx.fill();

  const pax3 = camera.x * 0.7;
  for (let i = 0; i < 30; i++) {
    const x = (i * 260) - pax3;
    const h = 70 + (i % 3) * 20;
    ctx.fillStyle = '#3a5a2f';
    ctx.fillRect(x + 10, GY - h, 6, h);
    ctx.beginPath();
    ctx.arc(x + 13, GY - h, 20 + (i%3)*4, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (let i = 0; i < 8; i++) {
    const x = ((i * 900 + t * 0.2) % (WW + 400)) - 200 - camera.x * 0.15;
    const y = 50 + (i * 37) % 120;
    drawCloud(x, y);
  }
}

function drawCloud(x, y) {
  ctx.beginPath();
  ctx.arc(x, y, 22, 0, Math.PI*2);
  ctx.arc(x + 22, y + 4, 18, 0, Math.PI*2);
  ctx.arc(x - 20, y + 4, 16, 0, Math.PI*2);
  ctx.arc(x + 10, y - 10, 15, 0, Math.PI*2);
  ctx.fill();
}

function drawPlatforms() {
  for (const pl of plats) {
    if (pl.x + pl.w < camera.x - 50 || pl.x > camera.x + W + 50) continue;
    if (pl.t === 'g') {
      ctx.fillStyle = '#5a3a22';
      ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
      ctx.fillStyle = '#3d8a3a';
      ctx.fillRect(pl.x, pl.y, pl.w, 8);
      ctx.fillStyle = '#57a754';
      for (let x = pl.x + 6; x < pl.x + pl.w - 4; x += 12) ctx.fillRect(x, pl.y - 2, 2, 4);
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(pl.x, pl.y + 8, pl.w, 4);
    } else if (pl.t === 'w') {
      ctx.fillStyle = '#7a4a20';
      ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
      ctx.fillStyle = '#9c6a30';
      ctx.fillRect(pl.x, pl.y, pl.w, 4);
      ctx.strokeStyle = '#552c10';
      ctx.lineWidth = 1;
      for (let x = pl.x + 16; x < pl.x + pl.w; x += 18) {
        ctx.beginPath(); ctx.moveTo(x, pl.y); ctx.lineTo(x, pl.y + pl.h); ctx.stroke();
      }
    } else if (pl.t === 'r') {
      ctx.fillStyle = '#6a6a74';
      ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
      ctx.fillStyle = '#8a8a94';
      ctx.fillRect(pl.x, pl.y, pl.w, 5);
      ctx.fillStyle = '#44444c';
      ctx.fillRect(pl.x, pl.y + pl.h - 3, pl.w, 3);
    }
  }
}

function drawShopFlag() {
  const z = shopZone;
  ctx.fillStyle = '#555';
  ctx.fillRect(z.x + 38, z.y - 60, 4, 100);
  ctx.fillStyle = '#ffa500';
  ctx.beginPath();
  ctx.moveTo(z.x + 42, z.y - 55);
  ctx.lineTo(z.x + 80, z.y - 45);
  ctx.lineTo(z.x + 42, z.y - 30);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#7a4a20';
  ctx.fillRect(z.x, z.y - 40, 76, 38);
  ctx.fillStyle = '#c28050';
  ctx.fillRect(z.x + 2, z.y - 38, 72, 34);
  ctx.fillStyle = '#000';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SHOP', z.x + 38, z.y - 20);
  ctx.font = '11px monospace';
  ctx.fillText('[E]', z.x + 38, z.y - 8);
  ctx.textAlign = 'left';
}

function drawTree() {
  if (tree.dead && tree.fallT > 140) return;
  ctx.save();
  if (tree.dead) {
    const ang = Math.min(Math.PI/2, tree.fallT * 0.018);
    ctx.translate(tree.x + tree.w/2, tree.y + tree.h);
    ctx.rotate(ang);
    ctx.translate(-(tree.x + tree.w/2), -(tree.y + tree.h));
  }
  const tx = tree.x, ty = tree.y, tw = tree.w, th = tree.h;
  const hit = tree.hf > 0;
  // Trunk
  ctx.fillStyle = hit ? '#c88038' : '#6b3a1a';
  ctx.fillRect(tx + 60, ty + 180, tw - 120, th - 180);
  ctx.strokeStyle = '#3e1f0a';
  ctx.lineWidth = 2;
  for (let y = ty + 220; y < ty + th; y += 28) {
    ctx.beginPath();
    ctx.moveTo(tx + 64, y);
    ctx.bezierCurveTo(tx + 80, y + 8, tx + tw - 80, y + 8, tx + tw - 64, y);
    ctx.stroke();
  }
  // Foliage (bigger, more menacing)
  const cx = tx + tw/2;
  const breath = Math.sin(tree.breathT) * 3;
  const layers = [
    { cx, cy: ty + 50 + breath, r: 130 },
    { cx: cx - 70, cy: ty + 90 + breath, r: 95 },
    { cx: cx + 70, cy: ty + 90 + breath, r: 95 },
    { cx, cy: ty + 20 + breath, r: 85 },
    { cx: cx - 100, cy: ty + 50 + breath, r: 70 },
    { cx: cx + 100, cy: ty + 50 + breath, r: 70 },
    { cx, cy: ty + 130 + breath, r: 90 },
  ];
  ctx.fillStyle = hit ? '#a8ff80' : '#2a6a22';
  for (const l of layers) { ctx.beginPath(); ctx.arc(l.cx, l.cy, l.r, 0, Math.PI*2); ctx.fill(); }
  ctx.fillStyle = hit ? '#c0ff90' : '#3a8a2a';
  for (const l of layers) { ctx.beginPath(); ctx.arc(l.cx - 14, l.cy - 14, l.r * 0.6, 0, Math.PI*2); ctx.fill(); }

  // Angry face!
  drawTreeFace(cx, ty + 90 + breath, hit);
  ctx.restore();
}

function drawTreeFace(cx, cy, hit) {
  // Eye sockets
  ctx.fillStyle = '#0c1a0a';
  ctx.beginPath();
  ctx.ellipse(cx - 34, cy, 22, 20, 0, 0, Math.PI*2);
  ctx.ellipse(cx + 34, cy, 22, 20, 0, 0, Math.PI*2);
  ctx.fill();
  // Glowing angry eyes
  const eyeCol = hit ? '#fff266' : '#ff2a2a';
  ctx.fillStyle = eyeCol;
  ctx.shadowColor = eyeCol;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(cx - 34, cy + 2, 9, 0, Math.PI*2);
  ctx.arc(cx + 34, cy + 2, 9, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // Pupils
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(cx - 34, cy + 3, 4, 0, Math.PI*2);
  ctx.arc(cx + 34, cy + 3, 4, 0, Math.PI*2);
  ctx.fill();
  // Angry brows (sloped inward and down from sides)
  ctx.fillStyle = '#3a2010';
  ctx.save();
  ctx.translate(cx - 34, cy - 20);
  ctx.rotate(0.55);
  ctx.fillRect(-22, 0, 40, 7);
  ctx.restore();
  ctx.save();
  ctx.translate(cx + 34, cy - 20);
  ctx.rotate(-0.55);
  ctx.fillRect(-22, 0, 40, 7);
  ctx.restore();
  // Wooden scowl wrinkles under brows
  ctx.strokeStyle = '#2a1808';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - 20, cy - 8); ctx.lineTo(cx - 10, cy - 12);
  ctx.moveTo(cx + 20, cy - 8); ctx.lineTo(cx + 10, cy - 12);
  ctx.stroke();
  // Grimacing mouth
  const my = cy + 62;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.moveTo(cx - 44, my);
  ctx.quadraticCurveTo(cx, my - 20, cx + 44, my);
  ctx.quadraticCurveTo(cx, my + 10, cx - 44, my);
  ctx.fill();
  // Teeth
  ctx.fillStyle = '#f6f2de';
  const tcn = 6;
  for (let i = 0; i < tcn; i++) {
    const x = cx - 34 + (i / (tcn - 1)) * 68;
    ctx.beginPath();
    ctx.moveTo(x - 4, my - 8);
    ctx.lineTo(x + 4, my - 8);
    ctx.lineTo(x, my - 1);
    ctx.closePath();
    ctx.fill();
  }
  for (let i = 0; i < tcn - 1; i++) {
    const x = cx - 28 + (i / (tcn - 2)) * 56;
    ctx.beginPath();
    ctx.moveTo(x - 3, my + 3);
    ctx.lineTo(x + 3, my + 3);
    ctx.lineTo(x, my + 8);
    ctx.closePath();
    ctx.fill();
  }
}

function drawCarrots() {
  for (const c of carrots) {
    if (c.g) continue;
    if (c.x < camera.x - 50 || c.x > camera.x + W + 50) continue;
    const bob = Math.sin(c.t || 0) * 2;
    const cx = c.x, cy = c.y + bob;
    ctx.fillStyle = '#ff9022';
    ctx.beginPath();
    ctx.moveTo(cx - 5, cy); ctx.lineTo(cx + 5, cy); ctx.lineTo(cx, cy + 14);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#b85a10'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 3, cy + 4); ctx.lineTo(cx + 3, cy + 4);
    ctx.moveTo(cx - 2, cy + 8); ctx.lineTo(cx + 2, cy + 8);
    ctx.stroke();
    ctx.fillStyle = '#3a8a2a';
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.quadraticCurveTo(cx - 6, cy - 5, cx - 4, cy - 10);
    ctx.quadraticCurveTo(cx - 2, cy - 7, cx, cy - 2);
    ctx.quadraticCurveTo(cx + 2, cy - 7, cx + 4, cy - 10);
    ctx.quadraticCurveTo(cx + 6, cy - 5, cx, cy);
    ctx.fill();
  }
}

function drawEnemies() {
  for (const e of enemies) {
    if (e.dead) continue;
    if (e.x + e.w < camera.x - 50 || e.x > camera.x + W + 50) continue;
    ctx.save();
    let alpha = 1;
    if (e.phaseT > 0) alpha = 1 - (e.phaseT / 90);
    ctx.globalAlpha = alpha;
    ctx.translate(e.x + e.w/2, e.y + e.h/2);
    if (e.f < 0) ctx.scale(-1, 1);
    const flash = e.hf > 0;
    if (e.t === 'wolf') {
      ctx.fillStyle = flash ? '#fff' : '#3a2818';
      ctx.fillRect(-20, -8, 40, 16);
      ctx.fillStyle = flash ? '#fff' : '#4a3220';
      ctx.beginPath();
      ctx.moveTo(14, -4); ctx.lineTo(26, -4); ctx.lineTo(26, 6); ctx.lineTo(14, 6); ctx.closePath();
      ctx.fill();
      ctx.fillRect(24, 0, 4, 3);
      ctx.fillStyle = '#ff3333';
      ctx.fillRect(20, -2, 2, 2);
      ctx.fillStyle = flash ? '#fff' : '#2a1a08';
      ctx.fillRect(-14, 8, 4, 6); ctx.fillRect(-4, 8, 4, 6);
      ctx.fillRect(6, 8, 4, 6);   ctx.fillRect(14, 8, 4, 6);
      ctx.fillStyle = flash ? '#fff' : '#3a2818';
      ctx.fillRect(-24, -4, 6, 4);
    } else if (e.t === 'bat') {
      ctx.fillStyle = flash ? '#fff' : '#2a1a36';
      ctx.beginPath();
      ctx.ellipse(0, 0, 8, 6, 0, 0, Math.PI*2);
      ctx.fill();
      const wa = Math.sin(t * 0.5) * 0.5;
      ctx.fillStyle = flash ? '#fff' : '#3a2a46';
      ctx.beginPath();
      ctx.moveTo(-4, 0);
      ctx.lineTo(-16, -4 + wa * 6);
      ctx.lineTo(-14, 4 + wa * 4);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(4, 0);
      ctx.lineTo(16, -4 + wa * 6);
      ctx.lineTo(14, 4 + wa * 4);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#f00';
      ctx.fillRect(-2, -2, 2, 2); ctx.fillRect(2, -2, 2, 2);
    }
    // Health bar when active
    if (e.phaseT <= 0 && e.hp < e.mh) {
      ctx.fillStyle = '#222';
      ctx.fillRect(-18, -16, 36, 3);
      ctx.fillStyle = '#e44';
      ctx.fillRect(-18, -16, 36 * (e.hp / e.mh), 3);
    }
    ctx.restore();

    // Phase-in ring & warning icon
    if (e.phaseT > 0) {
      ctx.save();
      const cx = e.x + e.w/2, cy = e.y + e.h/2;
      const prog = 1 - (e.phaseT / 90);
      const ringR = 40 - prog * 20;
      ctx.globalAlpha = 0.5 + Math.sin(t*0.4)*0.3;
      ctx.strokeStyle = e.t === 'bat' ? '#cc77dd' : '#ff6699';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx, cy, ringR, 0, Math.PI*2); ctx.stroke();
      // Warning triangle
      const blinkOn = Math.floor(t / 8) % 2 === 0;
      if (blinkOn) {
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.moveTo(cx, cy - 36);
        ctx.lineTo(cx - 8, cy - 22);
        ctx.lineTo(cx + 8, cy - 22);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.font = 'bold 11px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('!', cx, cy - 24);
        ctx.textAlign = 'left';
      }
      ctx.restore();
    }
  }
}

function drawBullets() {
  for (const b of bullets) {
    if (b.homing) {
      // Missile body
      const ang = Math.atan2(b.vy, b.vx);
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(ang);
      ctx.fillStyle = '#ddd';
      ctx.fillRect(-8, -3, 12, 6);
      ctx.fillStyle = '#c33';
      ctx.beginPath();
      ctx.moveTo(4, -3); ctx.lineTo(8, 0); ctx.lineTo(4, 3);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#888';
      ctx.fillRect(-8, -5, 3, 2); ctx.fillRect(-8, 3, 3, 2);
      // Flame trail
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.moveTo(-8, -2);
      ctx.lineTo(-14 - Math.random()*4, 0);
      ctx.lineTo(-8, 2);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    } else if (b.mega) {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffd040';
      ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill();
      for (let k = 0; k < 3; k++) {
        ctx.fillStyle = `rgba(255,220,60,${0.4 - k*0.12})`;
        ctx.beginPath(); ctx.arc(b.x - b.vx*k*0.6, b.y - b.vy*k*0.6, 4-k, 0, Math.PI*2); ctx.fill();
      }
    } else {
      // Crit = pink glow
      if (b.crit) {
        ctx.fillStyle = 'rgba(255,50,140,.5)';
        ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = b.exploding ? '#ff4422' : '#222';
      ctx.beginPath(); ctx.arc(b.x, b.y, 3.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = b.crit ? '#ff5599' : (b.exploding ? '#ffaa44' : '#ffcc44');
      ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI*2); ctx.fill();
    }
  }
}

function drawExplosions() {
  for (const e of explosions) {
    const a = e.life / 25;
    ctx.save();
    ctx.globalAlpha = a * 0.5;
    ctx.fillStyle = '#ffcc22';
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = a * 0.35;
    ctx.fillStyle = '#ff5522';
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * 0.7, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = a;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * 0.3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawPlayer() {
  const p = player;
  if (p.dead) return;
  const cx = p.x + p.w/2;
  const cy = p.y + p.h/2;

  // Speed dust
  if (upLevel('speed') && Math.abs(p.vx) > 2 && p.og && t % 3 === 0) {
    particles.push({ x: cx - p.f * 20, y: p.y + p.h - 2, vx:-p.f*1, vy:-1, life: 16, color:'#ccc', size: 2, g:-0.05 });
  }

  // Shield aura behind
  if (maxShield() > 0 && p.sh > 0) {
    const intensity = 0.2 + Math.sin(t*0.1)*0.08 + upLevel('shcap') * 0.02;
    ctx.strokeStyle = `rgba(120,200,255,${intensity})`;
    ctx.lineWidth = 2 + upLevel('shcap') * 0.1;
    ctx.beginPath();
    ctx.arc(cx, cy, 42, 0, Math.PI*2);
    ctx.stroke();
    ctx.strokeStyle = `rgba(180,230,255,${intensity*0.6})`;
    ctx.beginPath();
    ctx.arc(cx, cy, 46, 0, Math.PI*2);
    ctx.stroke();
  }

  ctx.save();
  ctx.translate(cx, cy);
  if (p.f < 0) ctx.scale(-1, 1);

  const flash = p.hf > 0;
  const blink = p.inv > 0 && Math.floor(t/4) % 2 === 0;
  ctx.globalAlpha = blink ? 0.5 : 1;

  // ===== Back thrusters (drawn behind everything) =====
  if (upLevel('djump')) {
    ctx.fillStyle = flash ? '#fff' : '#666';
    ctx.fillRect(-34, -6, 6, 10);
    ctx.fillStyle = flash ? '#fff' : '#44aaff';
    ctx.fillRect(-35, -4, 2, 6);
    if (upLevel('tjump')) {
      ctx.fillStyle = flash ? '#fff' : '#aaa';
      ctx.fillRect(-36, -10, 4, 4);
      ctx.fillRect(-36, 4, 4, 4);
      ctx.fillStyle = flash ? '#fff' : '#66ddff';
      ctx.fillRect(-37, -9, 2, 2);
      ctx.fillRect(-37, 5, 2, 2);
    }
  }

  // Speed exhaust pipe
  if (upLevel('speed')) {
    ctx.fillStyle = flash ? '#fff' : '#555';
    ctx.fillRect(-30, -4, 4, 3);
    ctx.fillStyle = flash ? '#fff' : '#222';
    ctx.fillRect(-31, -3, 2, 1);
  }

  // ===== Tracks =====
  ctx.fillStyle = flash ? '#fff' : '#1a1a1a';
  ctx.fillRect(-30, 4, 60, 10);
  ctx.fillStyle = flash ? '#fff' : '#333';
  for (let i = -24; i <= 24; i += 8) ctx.fillRect(i, 4, 3, 10);
  ctx.fillStyle = flash ? '#fff' : '#222';
  for (let i = -22; i <= 22; i += 11) {
    ctx.beginPath();
    ctx.arc(i, 9, 4, 0, Math.PI*2);
    ctx.fill();
  }
  // Jump springs (visible when jump lvl >= 1)
  if (upLevel('jump')) {
    ctx.strokeStyle = flash ? '#fff' : '#888';
    ctx.lineWidth = 1.5;
    for (let wi = -22; wi <= 22; wi += 22) {
      ctx.beginPath();
      ctx.moveTo(wi - 3, 4);
      ctx.lineTo(wi + 3, 2);
      ctx.lineTo(wi - 3, 0);
      ctx.lineTo(wi + 3, -2);
      ctx.stroke();
    }
  }
  // Ricochet rubber bumpers
  if (upLevel('ricochet')) {
    ctx.fillStyle = flash ? '#fff' : '#ff8800';
    ctx.fillRect(-30, 1, 3, 3);
    ctx.fillRect(27, 1, 3, 3);
  }

  // ===== Body =====
  const armorLvl = upLevel('armor');
  const bodyCol = armorLvl > 0 ? (armorLvl >= 5 ? '#2e4524' : '#3a5530') : '#4a7030';
  ctx.fillStyle = flash ? '#fff' : bodyCol;
  ctx.fillRect(-26, -10, 52, 16);
  ctx.fillStyle = flash ? '#fff' : (armorLvl > 0 ? '#223018' : '#3a5a22');
  ctx.fillRect(-26, 2, 52, 4);

  // Armor plating (thickness scales with level)
  if (armorLvl > 0) {
    const t1 = Math.min(6, 2 + armorLvl * 0.4);
    ctx.fillStyle = flash ? '#fff' : '#555';
    ctx.fillRect(-28 - (t1 - 2), -10, t1, 16);
    ctx.fillRect(26, -10, t1, 16);
    if (armorLvl >= 3) {
      ctx.fillStyle = flash ? '#fff' : '#888';
      for (let i = -25; i < 25; i += 6) {
        ctx.beginPath(); ctx.arc(i, -8, 1, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(i, 4, 1, 0, Math.PI*2); ctx.fill();
      }
    }
    if (armorLvl >= 6) {
      ctx.fillStyle = flash ? '#fff' : '#333';
      ctx.fillRect(-20, -12, 40, 2);
    }
  }

  // Lifesteal red stripe
  if (upLevel('lifesteal')) {
    ctx.fillStyle = flash ? '#fff' : '#c22';
    ctx.fillRect(-22, -6, 44, 2);
  }

  // Health regen green cross
  if (upLevel('hpregen')) {
    ctx.fillStyle = flash ? '#fff' : '#4dd65a';
    ctx.fillRect(-14, -5, 8, 2);
    ctx.fillRect(-11, -8, 2, 8);
  }

  // Carrot fortune emblem
  if (upLevel('fortune')) {
    ctx.fillStyle = flash ? '#fff' : '#ff9022';
    ctx.beginPath();
    ctx.moveTo(6, -7); ctx.lineTo(10, -7); ctx.lineTo(8, -1);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = flash ? '#fff' : '#3a8a2a';
    ctx.fillRect(7, -9, 2, 2);
  }

  // Carrot magnet (red horseshoe)
  if (upLevel('magnet')) {
    ctx.fillStyle = flash ? '#fff' : '#d22';
    ctx.fillRect(-12, -16, 4, 6);
    ctx.fillRect(8, -16, 4, 6);
    ctx.fillRect(-12, -16, 24, 3);
    ctx.fillStyle = flash ? '#fff' : '#aaa';
    ctx.fillRect(-12, -16, 4, 2);
    ctx.fillRect(8, -16, 4, 2);
  }

  // ===== Turret base =====
  const turretCol = armorLvl > 0 ? '#2e4525' : '#3a5825';
  ctx.fillStyle = flash ? '#fff' : turretCol;
  ctx.beginPath();
  ctx.arc(0, -10, 11, 0, Math.PI*2);
  ctx.fill();

  // Shield regen crystal (on turret top)
  if (upLevel('shregen')) {
    ctx.fillStyle = flash ? '#fff' : '#66ddff';
    ctx.beginPath();
    ctx.moveTo(0, -22);
    ctx.lineTo(4, -18);
    ctx.lineTo(2, -14);
    ctx.lineTo(-2, -14);
    ctx.lineTo(-4, -18);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = flash ? '#fff' : '#aaeeff';
    ctx.fillRect(-1, -20, 1, 4);
  }

  // Crit scope
  if (upLevel('crit')) {
    ctx.fillStyle = flash ? '#fff' : '#000';
    ctx.fillRect(-4, -16, 8, 4);
    ctx.fillStyle = flash ? '#fff' : '#ff0000';
    ctx.fillRect(-1, -15, 2, 2);
  }

  // ===== Cannon (rotated) =====
  ctx.save();
  ctx.translate(0, -10);
  const ta = p.f < 0 ? Math.PI - p.ta : p.ta;
  ctx.rotate(ta);
  drawCannon(flash);
  ctx.restore();

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawCannon(flash) {
  const hasMega = upLevel('mega') > 0;
  const hasMulti = upLevel('multishot') > 0;
  const hasExp = upLevel('explosive') > 0;
  const dmgLvl = upLevel('damage');
  const bspLvl = upLevel('bspeed');
  const rateLvl = upLevel('rate');
  const pierceLvl = upLevel('pierce');

  const cLen = hasMega ? 46 : (24 + Math.min(12, dmgLvl * 1.2));
  const cW = hasMega ? 10 : (6 + Math.floor(dmgLvl / 3));

  // Main barrel
  ctx.fillStyle = flash ? '#fff' : '#1e1e1e';
  ctx.fillRect(0, -cW/2, cLen, cW);

  // Multi-shot extra barrels
  if (hasMulti && !hasMega) {
    ctx.fillStyle = flash ? '#fff' : '#1e1e1e';
    ctx.fillRect(2, -cW/2 - 5, cLen - 4, 3);
    ctx.fillRect(2, cW/2 + 2, cLen - 4, 3);
  }

  // Explosive flame pattern
  if (hasExp && !hasMega) {
    ctx.fillStyle = flash ? '#fff' : '#ff6622';
    ctx.beginPath();
    ctx.moveTo(6, -cW/2);
    ctx.lineTo(cLen - 4, -cW/2);
    ctx.lineTo(cLen - 8, -cW/2 - 3);
    ctx.lineTo(10, -cW/2 - 2);
    ctx.closePath();
    ctx.fill();
  }

  // Bullet velocity fins
  if (bspLvl > 0 && !hasMega) {
    ctx.fillStyle = flash ? '#fff' : '#666';
    const fins = Math.min(3, Math.ceil(bspLvl / 3));
    for (let i = 0; i < fins; i++) {
      const fx = 6 + i * 5;
      ctx.fillRect(fx, -cW/2 - 2, 2, 2);
      ctx.fillRect(fx, cW/2, 2, 2);
    }
  }

  // Pierce drill spikes on tip
  if (pierceLvl > 0 && !hasMega) {
    ctx.fillStyle = flash ? '#fff' : '#ddaa00';
    ctx.beginPath();
    ctx.moveTo(cLen, -cW/2); ctx.lineTo(cLen + 4, 0); ctx.lineTo(cLen, cW/2);
    ctx.closePath(); ctx.fill();
  }

  // Rapid-fire glowing tip
  if (rateLvl > 0 && !hasMega) {
    const intensity = 0.5 + rateLvl * 0.05;
    ctx.fillStyle = `rgba(255, 80, 30, ${intensity})`;
    ctx.fillRect(cLen - 3, -cW/2 - 1, 3, cW + 2);
  }

  // Mega cannon additions
  if (hasMega) {
    // reinforced base
    ctx.fillStyle = flash ? '#fff' : '#555';
    ctx.fillRect(0, -cW/2 - 4, 10, cW + 8);
    // Missile pods (for homing missiles)
    ctx.fillStyle = flash ? '#fff' : '#3a3a3a';
    ctx.fillRect(6, -cW/2 - 11, 18, 6);
    ctx.fillRect(6, cW/2 + 5, 18, 6);
    // Individual missile tips
    ctx.fillStyle = flash ? '#fff' : '#c33';
    ctx.fillRect(22, -cW/2 - 9, 3, 2);
    ctx.fillRect(22, cW/2 + 7, 3, 2);
    ctx.fillRect(16, -cW/2 - 9, 3, 2);
    ctx.fillRect(16, cW/2 + 7, 3, 2);
    // Glowing tip
    ctx.fillStyle = flash ? '#fff' : '#444';
    ctx.fillRect(cLen - 6, -cW/2 - 3, 6, cW + 6);
    ctx.fillStyle = '#ffdd40';
    ctx.fillRect(cLen - 3, -4, 2, 8);
    ctx.fillStyle = `rgba(255,220,80,${0.4 + Math.sin(t*0.3)*0.2})`;
    ctx.beginPath(); ctx.arc(cLen, 0, 7, 0, Math.PI*2); ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.life / 25);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawFloats() {
  for (const f of floats) {
    ctx.globalAlpha = Math.min(1, f.life / 40);
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = '#000';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x + 1, f.y + 1);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
    ctx.textAlign = 'left';
  }
  ctx.globalAlpha = 1;
}

function drawVignette() {
  const grd = ctx.createRadialGradient(W/2, H/2, 200, W/2, H/2, 500);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

function drawMiniHints() {
  if (!tree.dead) {
    const treeScreenX = tree.x - camera.x;
    if (treeScreenX > W - 50) {
      ctx.save();
      ctx.globalAlpha = 0.7 + Math.sin(t*0.1)*0.2;
      ctx.fillStyle = '#2a6a22';
      ctx.beginPath();
      ctx.moveTo(W - 18, H/2 - 20); ctx.lineTo(W - 2, H/2); ctx.lineTo(W - 18, H/2 + 20);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'right';
      ctx.fillText('GREAT TREE', W - 26, H/2 + 4);
      ctx.restore();
    }
  }
  const shopScreenX = shopZone.x - camera.x;
  if (shopScreenX < -60) {
    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#ffa500';
    ctx.beginPath();
    ctx.moveTo(18, H/2 - 20); ctx.lineTo(2, H/2); ctx.lineTo(18, H/2 + 20);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SHOP', 26, H/2 + 4);
    ctx.restore();
  }
}

// ===== Loop =====
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ===== Restart =====
window.restartGame = function() { init(); };

// ===== Start =====
init();
loop();
})();
</script>
</body>
