<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tank vs The Great Tree</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Courier New',monospace;color:#fff;padding:16px;overflow:hidden;user-select:none}
  h1{font-size:20px;margin-bottom:10px;color:#9f9;text-shadow:2px 2px 0 #000;letter-spacing:3px}
  #wrap{position:relative;border:3px solid #333;box-shadow:0 0 36px rgba(100,200,100,.18)}
  canvas{display:block;background:#87ceeb;image-rendering:pixelated}

  #hud{position:absolute;top:10px;left:10px;font-size:13px;text-shadow:2px 2px 0 #000,-1px -1px 0 #000;pointer-events:none;z-index:5}
  #hud>div{margin-bottom:4px}
  .bar{display:inline-block;width:180px;height:12px;background:#222;border:1px solid #555;vertical-align:middle;position:relative;overflow:hidden;margin-left:4px}
  .bar>div{height:100%;transition:width .15s}
  .hp{background:linear-gradient(90deg,#e33,#f85)}
  .sh{background:linear-gradient(90deg,#4bf,#9cf);position:absolute;top:0;left:0;opacity:.85}

  #treeHud{position:absolute;top:10px;right:10px;font-size:13px;text-shadow:2px 2px 0 #000;text-align:right;display:none;z-index:5}
  #treeHud .bar{width:240px;height:14px;margin-top:4px;display:block}
  #treeHud .bar>div{background:linear-gradient(90deg,#2a6,#7c5);height:100%}

  #shop{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(6,6,12,.97);border:3px solid #ffa500;border-radius:6px;padding:18px;width:520px;max-height:88%;overflow-y:auto;display:none;z-index:10;box-shadow:0 0 40px rgba(255,165,0,.35)}
  #shop h2{color:#ffa500;text-align:center;margin-bottom:6px;font-size:18px;letter-spacing:2px}
  #shop .cc{text-align:center;font-size:15px;margin-bottom:10px;color:#ffa500}
  .upg{display:flex;align-items:center;padding:7px 6px;border-bottom:1px solid #222;gap:10px}
  .upg .ic{font-size:20px;width:30px;text-align:center}
  .upg .info{flex:1}
  .upg .n{font-weight:700;color:#ffd27a;font-size:13px}
  .upg .d{font-size:11px;color:#aaa;margin-top:2px}
  .upg .c{color:#ffa500;font-weight:700;font-size:12px;min-width:60px;text-align:right}
  .upg button{background:#ffa500;border:0;padding:5px 12px;cursor:pointer;border-radius:3px;font-weight:700;color:#000;font-family:inherit;letter-spacing:1px;font-size:12px}
  .upg button:hover:not(:disabled){background:#ffb530}
  .upg button:disabled{background:#333;color:#666;cursor:not-allowed}
  .upg.got{opacity:.45}
  .upg.got .n::after{content:' \2713';color:#4f4}
  #shop .hint{margin-top:10px;text-align:center;font-size:11px;color:#888}

  #msg{position:absolute;top:28%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);padding:10px 22px;border-radius:4px;font-size:16px;text-shadow:2px 2px 0 #000;display:none;z-index:8;border:2px solid #ffa500;pointer-events:none;text-align:center;white-space:nowrap}
  #prompt{position:absolute;bottom:30%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);padding:6px 12px;border-radius:3px;font-size:13px;display:none;z-index:6;pointer-events:none}
  #ctrl{position:absolute;bottom:6px;left:8px;font-size:10px;opacity:.55;pointer-events:none}

  #over,#win{position:absolute;inset:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:20;text-align:center;padding:20px}
  #over h1{color:#f44;font-size:52px;margin-bottom:10px}
  #win h1{color:#9f9;font-size:56px;margin-bottom:10px}
  #over button,#win button{margin-top:16px;padding:10px 28px;font-size:16px;background:#ffa500;color:#000;border:0;cursor:pointer;border-radius:3px;font-family:inherit;font-weight:700;letter-spacing:2px}
  #over button:hover,#win button:hover{background:#ffb530}
</style>
</head>
<body>
<h1>TANK vs THE GREAT TREE</h1>
<div id="wrap">
  <canvas id="cv" width="960" height="540"></canvas>
  <div id="hud">
    <div>HEALTH <span class="bar"><div class="hp" id="hpb" style="width:100%"></div><div class="sh" id="shb" style="width:0"></div></span></div>
    <div>CARROTS <span id="cv1">0</span></div>
    <div>UPGRADES <span id="cv2">0</span>/10</div>
  </div>
  <div id="treeHud">
    THE GREAT TREE
    <div class="bar"><div id="treebar" style="width:100%"></div></div>
  </div>
  <div id="shop">
    <h2>UPGRADE SHOP</h2>
    <div class="cc"><span id="shopC">0</span> carrots</div>
    <div id="upList"></div>
    <div class="hint">[E] to close</div>
  </div>
  <div id="msg"></div>
  <div id="prompt"></div>
  <div id="ctrl">A/D or &larr;&rarr; move &nbsp;|&nbsp; W/Space/&uarr; jump &nbsp;|&nbsp; Mouse aim &nbsp;|&nbsp; Click / X shoot &nbsp;|&nbsp; E shop</div>
  <div id="over">
    <h1>GAME OVER</h1>
    <div>Your tank was destroyed.</div>
    <button onclick="restartGame()">TRY AGAIN</button>
  </div>
  <div id="win">
    <h1>VICTORY!</h1>
    <div>The Great Tree has fallen.</div>
    <div style="margin-top:8px;color:#aaa">Carrots: <span id="fcv">0</span></div>
    <button onclick="restartGame()">PLAY AGAIN</button>
  </div>
</div>
<script>
(() => {
'use strict';

// ===== Constants =====
const W = 960, H = 540, GY = 500, WW = 7600, G = 0.55;

const UPG = [
  { id:'speed',   n:'Speed Boost',     d:'+50% movement speed',            c:10,  i:'\uD83D\uDCA8' },
  { id:'armor',   n:'Armor Plating',   d:'+50 max health',                 c:20,  i:'\uD83D\uDEE1' },
  { id:'damage',  n:'Bigger Shells',   d:'x2.5 bullet damage',             c:30,  i:'\uD83D\uDCA5' },
  { id:'rate',    n:'Rapid Fire',      d:'2x fire rate',                   c:50,  i:'\uD83D\uDD25' },
  { id:'jump',    n:'Boosted Jump',    d:'Jump higher',                    c:70,  i:'\u2B06'         },
  { id:'djump',   n:'Air Jets',        d:'Double jump',                    c:90,  i:'\uD83D\uDE80'  },
  { id:'pierce',  n:'Piercing Rounds', d:'Bullets pierce enemies',         c:110, i:'\u27A1'         },
  { id:'magnet',  n:'Carrot Magnet',   d:'Auto-collect nearby carrots',    c:130, i:'\uD83E\uDDF2'  },
  { id:'shield',  n:'Energy Shield',   d:'+40 regenerating shield',        c:160, i:'\uD83D\uDD35'  },
  { id:'mega',    n:'MEGA CANNON',     d:'REQUIRED to destroy the Great Tree!', c:220, i:'\u26A1' },
];

// ===== DOM =====
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const hpb = document.getElementById('hpb');
const shb = document.getElementById('shb');
const cv1 = document.getElementById('cv1');
const cv2 = document.getElementById('cv2');
const treeHud = document.getElementById('treeHud');
const treeBarFill = document.getElementById('treebar');
const shopEl = document.getElementById('shop');
const shopC = document.getElementById('shopC');
const upListEl = document.getElementById('upList');
const msgEl = document.getElementById('msg');
const promptEl = document.getElementById('prompt');
const overEl = document.getElementById('over');
const winEl = document.getElementById('win');
const fcvEl = document.getElementById('fcv');

// ===== Input =====
const keys = {};
const mouse = { x: W/2, y: H/2, wx: 0, wy: 0, d: false };

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyE') toggleShopAtZone();
  if (['Space','ArrowUp','KeyW'].includes(e.code)) { doJump(); e.preventDefault(); }
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  if (e.code === 'KeyX') tryShoot();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

cv.addEventListener('mousemove', e => {
  const r = cv.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top) * (H / r.height);
});
cv.addEventListener('mousedown', e => { mouse.d = true; tryShoot(); });
cv.addEventListener('mouseup', e => { mouse.d = false; });
cv.addEventListener('mouseleave', () => { mouse.d = false; });
cv.addEventListener('contextmenu', e => e.preventDefault());

// ===== Game State =====
let player, plats, carrots, enemies, enemySpawns, bullets, particles, tree, camera, gameState, msgTimer, shopOpen, shake, shopZone, nearShop, t;

function init() {
  player = {
    x: 120, y: 430, w: 56, h: 30,
    vx: 0, vy: 0, og: false, ju: 0,
    f: 1, ta: 0,
    sc: 0, inv: 0, hf: 0,
    mh: 100, hp: 100,
    ms: 0, sh: 0, srt: 0,
    cr: 0, up: new Set(), dead: false,
  };
  bullets = [];
  particles = [];
  plats = buildPlats();
  carrots = buildCarrots();
  enemySpawns = buildSpawns();
  enemies = enemySpawns.map(spawnE);
  tree = { x: 7150, y: 150, w: 180, h: 350, hp: 600, mhp: 600, hf: 0, dead: false, fallT: 0, leavesY: 0 };
  camera = { x: 0, y: 0 };
  shopZone = { x: 330, y: 400, w: 80, h: 100 };
  gameState = 'playing';
  msgTimer = 0;
  shopOpen = false;
  shake = 0;
  nearShop = false;
  t = 0;
  hideShop();
  overEl.style.display = 'none';
  winEl.style.display = 'none';
  treeHud.style.display = 'none';
  updateHUD();
  showMessage('Collect carrots and buy upgrades at the SHOP!', 180);
}

// ===== World =====
function buildPlats() {
  const p = [];
  // Main ground pieces with gaps between
  p.push({ x:   0, y: GY, w:  900, h: 60, t:'g' }); // start
  p.push({ x:1000, y: GY, w:  550, h: 60, t:'g' });
  p.push({ x:1650, y: GY, w:  900, h: 60, t:'g' });
  p.push({ x:2700, y: GY, w:  650, h: 60, t:'g' });
  p.push({ x:3450, y: GY, w: 1200, h: 60, t:'g' });
  p.push({ x:4750, y: GY, w:  450, h: 60, t:'g' });
  p.push({ x:5350, y: GY, w:  500, h: 60, t:'g' });
  p.push({ x:6000, y: GY, w:  550, h: 60, t:'g' });
  p.push({ x:6700, y: GY, w:  900, h: 60, t:'g' }); // tree area

  // Floating wooden platforms
  p.push({ x:500, y:400, w:120, h:16, t:'w' });
  p.push({ x:680, y:320, w:120, h:16, t:'w' });

  p.push({ x:1050, y:400, w:100, h:16, t:'w' });
  p.push({ x:1230, y:340, w:100, h:16, t:'w' });
  p.push({ x:1430, y:280, w:100, h:16, t:'w' });

  p.push({ x:1720, y:400, w:120, h:16, t:'w' });
  p.push({ x:1910, y:330, w:120, h:16, t:'w' });
  p.push({ x:2110, y:260, w:120, h:16, t:'w' });
  p.push({ x:2310, y:190, w:120, h:16, t:'w' });

  p.push({ x:2580, y:430, w:80,  h:16, t:'w' }); // gap crossing

  p.push({ x:2800, y:390, w:130, h:16, t:'w' });
  p.push({ x:3010, y:310, w:130, h:16, t:'w' });
  p.push({ x:3220, y:230, w:130, h:16, t:'w' });

  p.push({ x:3380, y:440, w:70,  h:16, t:'w' });

  p.push({ x:3560, y:400, w:130, h:16, t:'w' });
  p.push({ x:3770, y:330, w:130, h:16, t:'w' });
  p.push({ x:3970, y:260, w:130, h:16, t:'w' });
  p.push({ x:4170, y:190, w:120, h:16, t:'w' });
  p.push({ x:4370, y:120, w:110, h:16, t:'w' });
  p.push({ x:4520, y:210, w:120, h:16, t:'w' });

  p.push({ x:4830, y:430, w:120, h:30, t:'r' });
  p.push({ x:4990, y:370, w:130, h:30, t:'r' });

  p.push({ x:5230, y:440, w:70,  h:16, t:'w' });

  p.push({ x:5400, y:390, w:120, h:16, t:'w' });
  p.push({ x:5580, y:320, w:120, h:16, t:'w' });
  p.push({ x:5760, y:250, w:120, h:16, t:'w' });

  p.push({ x:5890, y:440, w:70,  h:16, t:'w' });

  p.push({ x:6050, y:390, w:100, h:16, t:'w' });
  p.push({ x:6210, y:320, w:100, h:16, t:'w' });
  p.push({ x:6380, y:250, w:100, h:16, t:'w' });

  p.push({ x:6590, y:440, w:70,  h:16, t:'w' });

  p.push({ x:6770, y:400, w:130, h:16, t:'w' });
  p.push({ x:6980, y:330, w:130, h:16, t:'w' });
  p.push({ x:7180, y:260, w:120, h:16, t:'w' });

  return p;
}

function buildCarrots() {
  const c = [];
  const cluster = (x, y, n, sp = 28) => { for (let i = 0; i < n; i++) c.push({ x: x + (i - (n-1)/2) * sp, y, g:false, t: Math.random()*Math.PI*2 }); };
  // Starting area
  cluster(220, GY - 26, 4);
  cluster(440, GY - 26, 3);
  cluster(560, 370, 3, 26);
  cluster(740, 290, 3, 26);

  // After first gap
  cluster(1100, 370, 3, 26);
  cluster(1280, 310, 3, 26);
  cluster(1480, 250, 3, 26);

  // Mid ground & platforms
  cluster(1780, GY - 26, 4, 30);
  cluster(1980, GY - 26, 4, 30);
  cluster(2180, GY - 26, 4, 30);
  cluster(1770, 370, 3);
  cluster(1960, 300, 3);
  cluster(2160, 230, 3);
  cluster(2360, 160, 4);

  cluster(2620, 400, 2);

  cluster(2800, GY - 26, 4, 30);
  cluster(3000, GY - 26, 4, 30);
  cluster(3200, GY - 26, 4, 30);
  cluster(2860, 360, 3);
  cluster(3070, 280, 3);
  cluster(3280, 200, 4);

  cluster(3420, 410, 2);

  // Forest ground + climb
  cluster(3500, GY - 26, 4, 30);
  cluster(3700, GY - 26, 4, 30);
  cluster(3900, GY - 26, 4, 30);
  cluster(4100, GY - 26, 4, 30);
  cluster(4300, GY - 26, 4, 30);
  cluster(4500, GY - 26, 4, 30);

  cluster(3620, 370, 3);
  cluster(3830, 300, 3);
  cluster(4030, 230, 3);
  cluster(4230, 160, 3);
  cluster(4425, 90, 5, 24);   // top reward
  cluster(4580, 180, 3);

  // Hills
  cluster(4890, 400, 2);
  cluster(5055, 340, 3);

  cluster(5270, 410, 2);

  cluster(5460, 360, 3);
  cluster(5640, 290, 3);
  cluster(5820, 220, 4);

  cluster(5925, 410, 2);

  cluster(6100, 360, 3);
  cluster(6270, 290, 3);
  cluster(6440, 220, 4);

  cluster(6625, 410, 2);

  cluster(6830, 370, 3);
  cluster(7040, 300, 3);
  cluster(7240, 230, 4);

  cluster(6850, GY - 26, 4, 30);
  cluster(7100, GY - 26, 4, 30);

  return c;
}

function buildSpawns() {
  return [
    { x:1770, y:470, t:'wolf' },
    { x:1980, y:470, t:'wolf' },
    { x:2180, y:470, t:'wolf' },
    { x:2800, y:470, t:'wolf' },
    { x:3000, y:470, t:'wolf' },
    { x:3200, y:470, t:'wolf' },
    { x:3600, y:470, t:'wolf' },
    { x:3820, y:470, t:'wolf' },
    { x:4040, y:470, t:'wolf' },
    { x:4260, y:470, t:'wolf' },
    { x:4480, y:470, t:'wolf' },
    { x:4900, y:400, t:'wolf' },
    { x:5080, y:340, t:'wolf' },
    { x:6120, y:470, t:'wolf' },
    { x:6320, y:470, t:'wolf' },
    { x:6850, y:470, t:'wolf' },
    { x:7050, y:470, t:'wolf' },
    { x:7220, y:470, t:'wolf' },
    // Bats
    { x:4200, y:180, t:'bat' },
    { x:4400, y:130, t:'bat' },
    { x:5800, y:200, t:'bat' },
    { x:6300, y:220, t:'bat' },
    { x:6900, y:200, t:'bat' },
    { x:7150, y:180, t:'bat' },
  ];
}

function spawnE(sp) {
  const b = { sx: sp.x, sy: sp.y, x: sp.x, y: sp.y, vx: 0, vy: 0, t: sp.t, hf: 0, dead: false, respawn: 0 };
  if (sp.t === 'wolf') {
    return Object.assign(b, { w: 42, h: 28, mh: 30, hp: 30, dmg: 14, sp: 1.8, cr: 3, f: -1, og: false });
  }
  if (sp.t === 'bat') {
    return Object.assign(b, { w: 32, h: 22, mh: 15, hp: 15, dmg: 8, sp: 2.2, cr: 2, ay: sp.y, os: Math.random() * Math.PI * 2, fly: true, f: -1 });
  }
  return b;
}

// ===== Gameplay Logic =====
function doJump() {
  if (gameState !== 'playing' || shopOpen || player.dead) return;
  const maxJumps = player.up.has('djump') ? 2 : 1;
  if (player.ju < maxJumps) {
    const v = player.up.has('jump') ? -13.5 : -10.5;
    player.vy = v;
    player.ju++;
    player.og = false;
    if (player.ju === 2) {
      for (let i = 0; i < 10; i++) {
        particles.push({
          x: player.x + player.w/2 + (Math.random()-0.5)*22,
          y: player.y + player.h,
          vx: (Math.random()-0.5)*3.5,
          vy: Math.random()*3 + 1,
          life: 18 + Math.random()*10,
          color: '#ffc040',
          size: 3 + Math.random()*2,
          g: 0.05,
        });
      }
    }
  }
}

function tryShoot() {
  if (gameState !== 'playing' || shopOpen || player.dead) return;
  if (player.sc > 0) return;
  const hasMega = player.up.has('mega');
  const hasRate = player.up.has('rate');
  const hasDmg = player.up.has('damage');
  const hasPierce = player.up.has('pierce');

  player.sc = hasMega ? 48 : (hasRate ? 13 : 26);

  const cx = player.x + player.w/2;
  const cy = player.y + player.h/2 - 10;
  const ang = player.ta;
  const cannonLen = hasMega ? 44 : 26;
  const sx = cx + Math.cos(ang) * cannonLen;
  const sy = cy + Math.sin(ang) * cannonLen;
  const spd = hasMega ? 13 : 10;
  let dmg = 5;
  if (hasDmg) dmg *= 2.5;
  if (hasMega) dmg = 40;

  bullets.push({
    x: sx, y: sy,
    vx: Math.cos(ang) * spd,
    vy: Math.sin(ang) * spd,
    life: 80, dmg, pierce: hasPierce, mega: hasMega,
    hit: new Set(),
  });

  // Muzzle flash
  const flashCount = hasMega ? 16 : 7;
  for (let i = 0; i < flashCount; i++) {
    particles.push({
      x: sx, y: sy,
      vx: Math.cos(ang) * (3 + Math.random()*3) + (Math.random()-0.5)*2,
      vy: Math.sin(ang) * (3 + Math.random()*3) + (Math.random()-0.5)*2,
      life: 7 + Math.random()*8,
      color: hasMega ? '#fff080' : '#ffc144',
      size: hasMega ? 5 : 2.5,
      g: 0,
    });
  }
  // Recoil
  player.vx -= Math.cos(ang) * (hasMega ? 2.5 : 0.6);
  if (hasMega) shake = Math.max(shake, 6);
}

function takeDamage(amount) {
  if (player.inv > 0 || player.dead) return;
  // Absorb with shield first
  if (player.sh > 0) {
    const absorb = Math.min(player.sh, amount);
    player.sh -= absorb;
    amount -= absorb;
    player.srt = 120;
  }
  if (amount > 0) {
    player.hp -= amount;
    player.hf = 10;
  }
  player.inv = 35;
  shake = Math.max(shake, 4);
  if (player.hp <= 0) {
    player.hp = 0;
    player.dead = true;
    gameState = 'gameover';
    overEl.style.display = 'flex';
    // Explosion
    for (let i = 0; i < 40; i++) {
      particles.push({
        x: player.x + player.w/2, y: player.y + player.h/2,
        vx: (Math.random()-0.5) * 10,
        vy: (Math.random()-0.5) * 10 - 2,
        life: 40 + Math.random()*30,
        color: ['#ff4400','#ffaa00','#444','#888'][Math.floor(Math.random()*4)],
        size: 3 + Math.random()*4,
        g: 0.2,
      });
    }
  }
}

function collectCarrot(c) {
  c.g = true;
  player.cr += 1;
  for (let i = 0; i < 5; i++) {
    particles.push({
      x: c.x, y: c.y,
      vx: (Math.random()-0.5)*3,
      vy: -Math.random()*2 - 1,
      life: 20, color: '#ff9022', size: 2, g: 0.2,
    });
  }
  updateHUD();
}

// ===== Updates =====
function update() {
  if (gameState !== 'playing') return;
  t++;
  if (shopOpen) return; // pause world while shopping

  updatePlayer();
  updateBullets();
  updateEnemies();
  updateCarrots();
  updateTree();
  updateParticles();
  updateCamera();
  updateShopZone();
  updateMessage();
  if (shake > 0) shake *= 0.85;
}

function updatePlayer() {
  const p = player;
  if (p.dead) return;

  const hasSpeed = p.up.has('speed');
  const maxSp = hasSpeed ? 4.6 : 3.1;
  const accel = 0.55;

  let h = 0;
  if (keys['KeyA'] || keys['ArrowLeft']) h -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) h += 1;

  if (h !== 0) {
    p.vx += h * accel;
    p.vx = Math.max(-maxSp, Math.min(maxSp, p.vx));
    p.f = h;
  } else {
    p.vx *= p.og ? 0.82 : 0.94;
    if (Math.abs(p.vx) < 0.05) p.vx = 0;
  }

  p.vy += G;
  if (p.vy > 16) p.vy = 16;

  p.x += p.vx;
  resolveX(p);
  p.y += p.vy;
  resolveY(p);

  if (p.x < 0) { p.x = 0; p.vx = 0; }
  if (p.x + p.w > WW) { p.x = WW - p.w; p.vx = 0; }

  // Fall in pit
  if (p.y > H + 200) {
    takeDamage(25);
    if (!p.dead) {
      p.x = 160; p.y = 420; p.vx = 0; p.vy = 0; p.inv = 60;
    }
  }

  // Shoot
  if (p.sc > 0) p.sc--;
  if (mouse.d && p.sc === 0) tryShoot();

  // Turret angle
  const cx = p.x + p.w/2;
  const cy = p.y + p.h/2 - 10;
  p.ta = Math.atan2(mouse.wy - cy, mouse.wx - cx);

  if (p.inv > 0) p.inv--;
  if (p.hf > 0) p.hf--;

  // Shield
  p.ms = p.up.has('shield') ? 40 : 0;
  if (p.sh > p.ms) p.sh = p.ms;
  if (p.up.has('shield')) {
    if (p.srt > 0) p.srt--;
    else if (p.sh < p.ms) p.sh = Math.min(p.ms, p.sh + 0.25);
  }

  updateHUD();
}

function resolveX(p) {
  for (const pl of plats) {
    if (rectHit(p, pl)) {
      if (p.vx > 0) p.x = pl.x - p.w;
      else if (p.vx < 0) p.x = pl.x + pl.w;
      p.vx = 0;
    }
  }
}
function resolveY(p) {
  p.og = false;
  for (const pl of plats) {
    if (rectHit(p, pl)) {
      if (p.vy > 0) {
        p.y = pl.y - p.h;
        p.og = true;
        p.ju = 0;
      } else if (p.vy < 0) {
        p.y = pl.y + pl.h;
      }
      p.vy = 0;
    }
  }
}
function rectHit(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;

    // Platform collisions
    let hit = false;
    for (const pl of plats) {
      if (b.x > pl.x && b.x < pl.x + pl.w && b.y > pl.y && b.y < pl.y + pl.h) {
        hit = true; break;
      }
    }
    // Enemy collisions
    for (const e of enemies) {
      if (e.dead) continue;
      if (b.hit.has(e)) continue;
      if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
        e.hp -= b.dmg;
        e.hf = 8;
        b.hit.add(e);
        // hit particles
        for (let k = 0; k < 5; k++) {
          particles.push({ x: b.x, y: b.y, vx:(Math.random()-0.5)*3, vy:(Math.random()-0.5)*3, life: 12, color:'#fff', size: 2, g:0 });
        }
        if (e.hp <= 0) killEnemy(e);
        if (!b.pierce) { hit = true; break; }
      }
    }
    // Tree collision
    if (!tree.dead && b.x > tree.x && b.x < tree.x + tree.w && b.y > tree.y && b.y < tree.y + tree.h) {
      if (b.mega) {
        tree.hp -= b.dmg;
        tree.hf = 8;
        shake = Math.max(shake, 4);
        for (let k = 0; k < 14; k++) {
          particles.push({ x: b.x, y: b.y, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, life: 25, color: Math.random()<.5?'#8b4513':'#4a7c3a', size: 3, g:0.1 });
        }
        treeHud.style.display = 'block';
        treeBarFill.style.width = (tree.hp / tree.mhp * 100) + '%';
        if (tree.hp <= 0) {
          tree.hp = 0;
          tree.dead = true;
          tree.fallT = 1;
          shake = 18;
          for (let k = 0; k < 60; k++) {
            particles.push({ x: tree.x + tree.w/2 + (Math.random()-0.5)*tree.w, y: tree.y + (Math.random()*tree.h), vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*4 - 2, life: 60 + Math.random()*40, color: Math.random()<.5?'#8b4513':'#4a7c3a', size: 4+Math.random()*3, g: 0.15 });
          }
          setTimeout(() => {
            gameState = 'won';
            winEl.style.display = 'flex';
            fcvEl.textContent = player.cr;
          }, 2000);
        }
      } else {
        // Deflect
        for (let k = 0; k < 6; k++) {
          particles.push({ x: b.x, y: b.y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, life: 18, color:'#fff', size: 2, g:0 });
        }
        showMessage('NOT POWERFUL ENOUGH! You need the MEGA CANNON!', 120);
        hit = true;
      }
    }

    if (hit || b.life <= 0 || b.x < 0 || b.x > WW || b.y > H + 100) {
      bullets.splice(i, 1);
    }
  }
}

function killEnemy(e) {
  e.dead = true;
  e.respawn = 240;
  // Drop carrots
  for (let k = 0; k < e.cr; k++) {
    carrots.push({
      x: e.x + e.w/2 + (Math.random()-0.5)*20,
      y: e.y, g: false,
      vx: (Math.random()-0.5)*3,
      vy: -Math.random()*3 - 2,
      drop: true, t: Math.random()*Math.PI*2,
    });
  }
  for (let k = 0; k < 14; k++) {
    particles.push({ x: e.x + e.w/2, y: e.y + e.h/2, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6 - 1, life: 25 + Math.random()*15, color: Math.random()<.5?'#883':'#555', size: 3, g: 0.15 });
  }
}

function updateEnemies() {
  for (const e of enemies) {
    if (e.dead) {
      e.respawn--;
      if (e.respawn <= 0) {
        e.dead = false;
        e.x = e.sx; e.y = e.sy;
        e.hp = e.mh; e.vx = 0; e.vy = 0;
      }
      continue;
    }
    if (e.hf > 0) e.hf--;

    const p = player;
    const dx = (p.x + p.w/2) - (e.x + e.w/2);
    const dy = (p.y + p.h/2) - (e.y + e.h/2);
    const dist = Math.hypot(dx, dy);

    if (e.t === 'wolf') {
      // Ground follower
      if (dist < 420 && !p.dead) {
        const dir = Math.sign(dx);
        e.vx += dir * 0.15;
        e.vx = Math.max(-e.sp, Math.min(e.sp, e.vx));
        e.f = dir;
      } else {
        e.vx *= 0.9;
      }
      e.vy += G;
      if (e.vy > 14) e.vy = 14;
      e.x += e.vx;
      resolveEnemyX(e);
      e.y += e.vy;
      resolveEnemyY(e);

      // Attack
      if (!p.dead && rectHit(e, p)) {
        takeDamage(e.dmg);
        // knockback
        const kx = p.x + p.w/2 < e.x + e.w/2 ? -6 : 6;
        p.vx = kx; p.vy = -5;
      }
      // Pit fall
      if (e.y > H + 200) { killEnemy(e); }
    } else if (e.t === 'bat') {
      e.os += 0.06;
      const flySp = e.sp;
      if (dist < 400 && !p.dead) {
        e.vx += Math.sign(dx) * 0.1;
        e.vy += Math.sign(dy) * 0.08;
      } else {
        // return to anchor
        e.vx += Math.sign(e.sx - e.x) * 0.05;
        e.vy += Math.sign(e.ay - e.y) * 0.05;
      }
      e.vx = Math.max(-flySp, Math.min(flySp, e.vx));
      e.vy = Math.max(-flySp, Math.min(flySp, e.vy));
      e.vx *= 0.96; e.vy *= 0.96;
      e.x += e.vx + Math.sin(e.os) * 0.3;
      e.y += e.vy + Math.cos(e.os) * 0.4;
      e.f = dx < 0 ? -1 : 1;
      if (!p.dead && rectHit(e, p)) {
        takeDamage(e.dmg);
        e.vx = -Math.sign(dx) * 3;
        e.vy = -2;
      }
    }
  }
}

function resolveEnemyX(e) {
  for (const pl of plats) {
    if (rectHit(e, pl)) {
      if (e.vx > 0) e.x = pl.x - e.w;
      else if (e.vx < 0) e.x = pl.x + pl.w;
      e.vx = -e.vx * 0.2;
    }
  }
}
function resolveEnemyY(e) {
  e.og = false;
  for (const pl of plats) {
    if (rectHit(e, pl)) {
      if (e.vy > 0) { e.y = pl.y - e.h; e.og = true; }
      else if (e.vy < 0) e.y = pl.y + pl.h;
      e.vy = 0;
    }
  }
}

function updateCarrots() {
  for (const c of carrots) {
    if (c.g) continue;
    c.t = (c.t || 0) + 0.08;
    // drop physics
    if (c.drop) {
      c.vy = (c.vy || 0) + G * 0.5;
      c.x += c.vx || 0;
      c.y += c.vy;
      // land on ground
      for (const pl of plats) {
        if (c.x > pl.x && c.x < pl.x + pl.w && c.y > pl.y - 4 && c.y < pl.y + 10) {
          c.y = pl.y - 4; c.vx = 0; c.vy = 0; c.drop = false;
          break;
        }
      }
      if (c.y > H + 200) { c.g = true; continue; }
      if (c.vx) c.vx *= 0.94;
    }
    const pcx = player.x + player.w/2, pcy = player.y + player.h/2;
    const dx = c.x - pcx, dy = c.y - pcy;
    const d = Math.hypot(dx, dy);
    if (player.up.has('magnet') && d < 160) {
      const pull = 0.6;
      c.x -= Math.sign(dx) * pull;
      c.y -= Math.sign(dy) * pull;
    }
    if (d < 26) collectCarrot(c);
  }
}

function updateTree() {
  if (tree.hf > 0) tree.hf--;
  if (tree.dead) {
    tree.fallT++;
    tree.leavesY = Math.min(200, tree.fallT * 2.5);
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.g) p.vy += p.g;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updateCamera() {
  const tx = player.x + player.w/2 - W/2;
  camera.x += (tx - camera.x) * 0.1;
  camera.x = Math.max(0, Math.min(WW - W, camera.x));
  camera.y = 0;
}

function updateShopZone() {
  const p = player;
  const near = p.x + p.w > shopZone.x - 40 && p.x < shopZone.x + shopZone.w + 40 && p.y + p.h > shopZone.y - 40;
  nearShop = near;
  if (near && !shopOpen) {
    promptEl.textContent = '[E] Open Shop';
    promptEl.style.display = 'block';
  } else if (!shopOpen) {
    promptEl.style.display = 'none';
  }
}

function updateMessage() {
  if (msgTimer > 0) {
    msgTimer--;
    if (msgTimer === 0) msgEl.style.display = 'none';
  }
}

function showMessage(text, duration = 180) {
  msgEl.textContent = text;
  msgEl.style.display = 'block';
  msgTimer = duration;
}

// ===== Shop =====
function toggleShopAtZone() {
  if (gameState !== 'playing') return;
  if (shopOpen) { hideShop(); return; }
  if (!nearShop) return;
  openShop();
}
function openShop() {
  shopOpen = true;
  renderShop();
  shopEl.style.display = 'block';
  promptEl.style.display = 'none';
}
function hideShop() {
  shopOpen = false;
  shopEl.style.display = 'none';
}
function renderShop() {
  upListEl.innerHTML = '';
  shopC.textContent = player.cr;
  for (const u of UPG) {
    const got = player.up.has(u.id);
    const affordable = player.cr >= u.c;
    const row = document.createElement('div');
    row.className = 'upg' + (got ? ' got' : '');
    row.innerHTML = `
      <div class="ic">${u.i}</div>
      <div class="info">
        <div class="n">${u.n}</div>
        <div class="d">${u.d}</div>
      </div>
      <div class="c">${u.c} 🥕</div>
    `;
    const btn = document.createElement('button');
    btn.textContent = got ? 'OWNED' : 'BUY';
    btn.disabled = got || !affordable;
    btn.onclick = () => buyUpgrade(u.id);
    row.appendChild(btn);
    upListEl.appendChild(row);
  }
}
function buyUpgrade(id) {
  const u = UPG.find(x => x.id === id);
  if (!u || player.up.has(id) || player.cr < u.c) return;
  player.cr -= u.c;
  player.up.add(id);
  // apply permanent effects
  if (id === 'armor') { player.mh += 50; player.hp += 50; }
  if (id === 'shield') { player.ms = 40; player.sh = 40; }
  if (id === 'mega') showMessage('MEGA CANNON ACQUIRED! Destroy the Great Tree!', 200);
  else showMessage(u.n + ' acquired!', 100);
  renderShop();
  updateHUD();
}

// ===== HUD =====
function updateHUD() {
  hpb.style.width = Math.max(0, player.hp / player.mh * 100) + '%';
  shb.style.width = player.ms > 0 ? (player.sh / player.mh * 100) + '%' : '0%';
  cv1.textContent = player.cr;
  cv2.textContent = player.up.size;
}

// ===== Rendering =====
function render() {
  ctx.save();
  // shake
  let sx = 0, sy = 0;
  if (shake > 0.2) {
    sx = (Math.random()-0.5) * shake;
    sy = (Math.random()-0.5) * shake;
  }
  // clear with sky
  drawSky();
  ctx.translate(-camera.x + sx, -camera.y + sy);

  // Mouse world coords
  mouse.wx = mouse.x + camera.x - sx;
  mouse.wy = mouse.y + camera.y - sy;

  drawBackground();
  drawPlatforms();
  drawShopFlag();
  drawTree();
  drawCarrots();
  drawEnemies();
  drawBullets();
  drawPlayer();
  drawParticles();

  ctx.restore();

  drawVignette();
  drawMiniHints();
}

function drawSky() {
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#70a8e6');
  grd.addColorStop(0.6, '#b8dcf0');
  grd.addColorStop(1, '#dcecc8');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

function drawBackground() {
  // Distant mountains (parallax 0.3)
  const pax = camera.x * 0.3;
  ctx.fillStyle = '#6a8a9a';
  ctx.beginPath();
  for (let x = -100; x < WW + 100; x += 200) {
    const xx = x - pax;
    ctx.moveTo(xx, GY);
    ctx.lineTo(xx + 100, GY - 150);
    ctx.lineTo(xx + 200, GY);
  }
  ctx.fill();

  // Closer hills (parallax 0.5)
  const pax2 = camera.x * 0.5;
  ctx.fillStyle = '#547a52';
  ctx.beginPath();
  for (let x = -150; x < WW + 150; x += 320) {
    const xx = x - pax2;
    ctx.moveTo(xx, GY);
    ctx.lineTo(xx + 160, GY - 90);
    ctx.lineTo(xx + 320, GY);
  }
  ctx.fill();

  // Distant trees
  const pax3 = camera.x * 0.7;
  for (let i = 0; i < 30; i++) {
    const x = (i * 260) - pax3;
    const h = 70 + (i % 3) * 20;
    ctx.fillStyle = '#3a5a2f';
    ctx.fillRect(x + 10, GY - h, 6, h);
    ctx.beginPath();
    ctx.arc(x + 13, GY - h, 20 + (i%3)*4, 0, Math.PI*2);
    ctx.fill();
  }

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (let i = 0; i < 8; i++) {
    const x = ((i * 900 + t * 0.2) % (WW + 400)) - 200 - camera.x * 0.15;
    const y = 50 + (i * 37) % 120;
    drawCloud(x, y);
  }
}

function drawCloud(x, y) {
  ctx.beginPath();
  ctx.arc(x, y, 22, 0, Math.PI*2);
  ctx.arc(x + 22, y + 4, 18, 0, Math.PI*2);
  ctx.arc(x - 20, y + 4, 16, 0, Math.PI*2);
  ctx.arc(x + 10, y - 10, 15, 0, Math.PI*2);
  ctx.fill();
}

function drawPlatforms() {
  for (const pl of plats) {
    if (pl.x + pl.w < camera.x - 50 || pl.x > camera.x + W + 50) continue;
    if (pl.t === 'g') {
      // grass top
      ctx.fillStyle = '#5a3a22';
      ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
      ctx.fillStyle = '#3d8a3a';
      ctx.fillRect(pl.x, pl.y, pl.w, 8);
      // grass blades
      ctx.fillStyle = '#57a754';
      for (let x = pl.x + 6; x < pl.x + pl.w - 4; x += 12) {
        ctx.fillRect(x, pl.y - 2, 2, 4);
      }
      // dirt shading
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(pl.x, pl.y + 8, pl.w, 4);
    } else if (pl.t === 'w') {
      ctx.fillStyle = '#7a4a20';
      ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
      ctx.fillStyle = '#9c6a30';
      ctx.fillRect(pl.x, pl.y, pl.w, 4);
      ctx.strokeStyle = '#552c10';
      ctx.lineWidth = 1;
      for (let x = pl.x + 16; x < pl.x + pl.w; x += 18) {
        ctx.beginPath(); ctx.moveTo(x, pl.y); ctx.lineTo(x, pl.y + pl.h); ctx.stroke();
      }
    } else if (pl.t === 'r') {
      ctx.fillStyle = '#6a6a74';
      ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
      ctx.fillStyle = '#8a8a94';
      ctx.fillRect(pl.x, pl.y, pl.w, 5);
      ctx.fillStyle = '#44444c';
      ctx.fillRect(pl.x, pl.y + pl.h - 3, pl.w, 3);
    }
  }
}

function drawShopFlag() {
  const z = shopZone;
  // pole
  ctx.fillStyle = '#555';
  ctx.fillRect(z.x + 38, z.y - 60, 4, 100);
  // flag
  ctx.fillStyle = '#ffa500';
  ctx.beginPath();
  ctx.moveTo(z.x + 42, z.y - 55);
  ctx.lineTo(z.x + 80, z.y - 45);
  ctx.lineTo(z.x + 42, z.y - 30);
  ctx.closePath();
  ctx.fill();
  // sign
  ctx.fillStyle = '#7a4a20';
  ctx.fillRect(z.x, z.y - 40, 76, 38);
  ctx.fillStyle = '#c28050';
  ctx.fillRect(z.x + 2, z.y - 38, 72, 34);
  ctx.fillStyle = '#000';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SHOP', z.x + 38, z.y - 20);
  ctx.font = '11px monospace';
  ctx.fillText('[E]', z.x + 38, z.y - 8);
  ctx.textAlign = 'left';
}

function drawTree() {
  if (tree.dead && tree.fallT > 120) return; // fully collapsed
  ctx.save();
  if (tree.dead) {
    const ang = Math.min(Math.PI/2, tree.fallT * 0.02);
    ctx.translate(tree.x + tree.w/2, tree.y + tree.h);
    ctx.rotate(ang);
    ctx.translate(-(tree.x + tree.w/2), -(tree.y + tree.h));
  }
  // Trunk
  const tx = tree.x, ty = tree.y, tw = tree.w, th = tree.h;
  const hitTint = tree.hf > 0;
  ctx.fillStyle = hitTint ? '#c88038' : '#6b3a1a';
  ctx.fillRect(tx + 50, ty + 100, tw - 100, th - 100);
  ctx.strokeStyle = '#3e1f0a';
  ctx.lineWidth = 2;
  for (let y = ty + 130; y < ty + th; y += 25) {
    ctx.beginPath();
    ctx.moveTo(tx + 54, y);
    ctx.bezierCurveTo(tx + 70, y + 8, tx + tw - 70, y + 8, tx + tw - 54, y);
    ctx.stroke();
  }
  // Foliage layers
  const layers = [
    { cx: tx + tw/2, cy: ty + 50, r: 110 },
    { cx: tx + tw/2 - 50, cy: ty + 90, r: 80 },
    { cx: tx + tw/2 + 50, cy: ty + 90, r: 80 },
    { cx: tx + tw/2, cy: ty + 20, r: 70 },
    { cx: tx + tw/2 - 80, cy: ty + 40, r: 60 },
    { cx: tx + tw/2 + 80, cy: ty + 40, r: 60 },
  ];
  ctx.fillStyle = hitTint ? '#a8ff80' : '#2a6a22';
  for (const l of layers) { ctx.beginPath(); ctx.arc(l.cx, l.cy, l.r, 0, Math.PI*2); ctx.fill(); }
  ctx.fillStyle = hitTint ? '#c0ff90' : '#3a8a2a';
  for (const l of layers) { ctx.beginPath(); ctx.arc(l.cx - 12, l.cy - 12, l.r * 0.6, 0, Math.PI*2); ctx.fill(); }
  ctx.restore();
}

function drawCarrots() {
  for (const c of carrots) {
    if (c.g) continue;
    if (c.x < camera.x - 50 || c.x > camera.x + W + 50) continue;
    const bob = Math.sin(c.t || 0) * 2;
    const cx = c.x, cy = c.y + bob;
    // body
    ctx.fillStyle = '#ff9022';
    ctx.beginPath();
    ctx.moveTo(cx - 5, cy);
    ctx.lineTo(cx + 5, cy);
    ctx.lineTo(cx, cy + 14);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#b85a10'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 3, cy + 4); ctx.lineTo(cx + 3, cy + 4);
    ctx.moveTo(cx - 2, cy + 8); ctx.lineTo(cx + 2, cy + 8);
    ctx.stroke();
    // leaves
    ctx.fillStyle = '#3a8a2a';
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.quadraticCurveTo(cx - 6, cy - 5, cx - 4, cy - 10);
    ctx.quadraticCurveTo(cx - 2, cy - 7, cx, cy - 2);
    ctx.quadraticCurveTo(cx + 2, cy - 7, cx + 4, cy - 10);
    ctx.quadraticCurveTo(cx + 6, cy - 5, cx, cy);
    ctx.fill();
  }
}

function drawEnemies() {
  for (const e of enemies) {
    if (e.dead) continue;
    if (e.x + e.w < camera.x - 50 || e.x > camera.x + W + 50) continue;
    ctx.save();
    ctx.translate(e.x + e.w/2, e.y + e.h/2);
    if (e.f < 0) ctx.scale(-1, 1);
    const flash = e.hf > 0;
    if (e.t === 'wolf') {
      // body
      ctx.fillStyle = flash ? '#fff' : '#3a2818';
      ctx.fillRect(-20, -8, 40, 16);
      // head
      ctx.fillStyle = flash ? '#fff' : '#4a3220';
      ctx.beginPath();
      ctx.moveTo(14, -4); ctx.lineTo(26, -4); ctx.lineTo(26, 6); ctx.lineTo(14, 6); ctx.closePath();
      ctx.fill();
      // snout
      ctx.fillRect(24, 0, 4, 3);
      // eye
      ctx.fillStyle = '#ff3333';
      ctx.fillRect(20, -2, 2, 2);
      // legs
      ctx.fillStyle = flash ? '#fff' : '#2a1a08';
      ctx.fillRect(-14, 8, 4, 6);
      ctx.fillRect(-4, 8, 4, 6);
      ctx.fillRect(6, 8, 4, 6);
      ctx.fillRect(14, 8, 4, 6);
      // tail
      ctx.fillStyle = flash ? '#fff' : '#3a2818';
      ctx.fillRect(-24, -4, 6, 4);
      // health bar
      if (e.hp < e.mh) {
        ctx.fillStyle = '#222';
        ctx.fillRect(-18, -16, 36, 3);
        ctx.fillStyle = '#e44';
        ctx.fillRect(-18, -16, 36 * (e.hp / e.mh), 3);
      }
    } else if (e.t === 'bat') {
      // body
      ctx.fillStyle = flash ? '#fff' : '#2a1a36';
      ctx.beginPath();
      ctx.ellipse(0, 0, 8, 6, 0, 0, Math.PI*2);
      ctx.fill();
      // wings (flap)
      const wa = Math.sin(t * 0.5) * 0.5;
      ctx.fillStyle = flash ? '#fff' : '#3a2a46';
      ctx.beginPath();
      ctx.moveTo(-4, 0);
      ctx.lineTo(-16, -4 + wa * 6);
      ctx.lineTo(-14, 4 + wa * 4);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(4, 0);
      ctx.lineTo(16, -4 + wa * 6);
      ctx.lineTo(14, 4 + wa * 4);
      ctx.closePath();
      ctx.fill();
      // eyes
      ctx.fillStyle = '#f00';
      ctx.fillRect(-2, -2, 2, 2);
      ctx.fillRect(2, -2, 2, 2);
      if (e.hp < e.mh) {
        ctx.fillStyle = '#222';
        ctx.fillRect(-14, -14, 28, 3);
        ctx.fillStyle = '#e44';
        ctx.fillRect(-14, -14, 28 * (e.hp / e.mh), 3);
      }
    }
    ctx.restore();
  }
}

function drawBullets() {
  for (const b of bullets) {
    if (b.mega) {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffd040';
      ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill();
      // Trail
      for (let k = 0; k < 3; k++) {
        ctx.fillStyle = `rgba(255,220,60,${0.4 - k*0.12})`;
        ctx.beginPath(); ctx.arc(b.x - b.vx * k * 0.6, b.y - b.vy * k * 0.6, 4 - k, 0, Math.PI*2); ctx.fill();
      }
    } else {
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(b.x, b.y, 3.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffcc44';
      ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI*2); ctx.fill();
    }
  }
}

function drawPlayer() {
  const p = player;
  if (p.dead) return;
  ctx.save();
  const cx = p.x + p.w/2;
  const cy = p.y + p.h/2;

  // Speed dust
  if (p.up.has('speed') && Math.abs(p.vx) > 2 && p.og) {
    if (t % 3 === 0) {
      particles.push({ x: cx - p.f * 20, y: p.y + p.h - 2, vx:-p.f*1, vy:-1, life: 16, color:'#ccc', size: 2, g:-0.05 });
    }
  }

  // Shield aura
  if (p.up.has('shield') && p.sh > 0) {
    const alpha = 0.25 + Math.sin(t*0.1)*0.1;
    ctx.strokeStyle = `rgba(120,200,255,${alpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, 40, 0, Math.PI*2);
    ctx.stroke();
    ctx.strokeStyle = `rgba(180,230,255,${alpha*0.6})`;
    ctx.beginPath();
    ctx.arc(cx, cy, 44, 0, Math.PI*2);
    ctx.stroke();
  }

  ctx.translate(cx, cy);
  if (p.f < 0) ctx.scale(-1, 1);

  // Flash white when hit
  const flash = p.hf > 0;
  const blink = p.inv > 0 && Math.floor(t/4) % 2 === 0;
  ctx.globalAlpha = blink ? 0.5 : 1;

  // Tracks
  ctx.fillStyle = flash ? '#fff' : '#1a1a1a';
  ctx.fillRect(-30, 4, 60, 10);
  ctx.fillStyle = flash ? '#fff' : '#333';
  for (let i = -24; i <= 24; i += 8) {
    ctx.fillRect(i, 4, 3, 10);
  }
  // Wheels
  ctx.fillStyle = flash ? '#fff' : '#222';
  for (let i = -22; i <= 22; i += 11) {
    ctx.beginPath();
    ctx.arc(i, 9, 4, 0, Math.PI*2);
    ctx.fill();
  }

  // Body
  const bodyCol = p.up.has('armor') ? '#3a5530' : '#4a7030';
  ctx.fillStyle = flash ? '#fff' : bodyCol;
  ctx.fillRect(-26, -10, 52, 16);
  ctx.fillStyle = flash ? '#fff' : (p.up.has('armor') ? '#2a4020' : '#3a5a22');
  ctx.fillRect(-26, 2, 52, 4);

  // Armor plates
  if (p.up.has('armor')) {
    ctx.fillStyle = flash ? '#fff' : '#666';
    ctx.fillRect(-28, -10, 4, 16);
    ctx.fillRect(24, -10, 4, 16);
    // Rivets
    ctx.fillStyle = flash ? '#fff' : '#aaa';
    for (let i = -25; i < 25; i += 8) {
      ctx.beginPath(); ctx.arc(i, -8, 1, 0, Math.PI*2); ctx.fill();
    }
  }

  // Air jets (on back)
  if (p.up.has('djump')) {
    ctx.fillStyle = flash ? '#fff' : '#888';
    ctx.fillRect(-32, -6, 4, 8);
    ctx.fillStyle = flash ? '#fff' : '#ccc';
    ctx.fillRect(-33, -5, 2, 6);
  }

  // Magnet
  if (p.up.has('magnet')) {
    ctx.fillStyle = flash ? '#fff' : '#d00';
    ctx.fillRect(-10, -15, 5, 6);
    ctx.fillRect(5, -15, 5, 6);
    ctx.fillStyle = flash ? '#fff' : '#888';
    ctx.fillRect(-10, -15, 5, 2);
    ctx.fillRect(5, -15, 5, 2);
  }

  // Turret base
  ctx.fillStyle = flash ? '#fff' : (p.up.has('armor') ? '#2e4525' : '#3a5825');
  ctx.beginPath();
  ctx.arc(0, -10, 11, 0, Math.PI*2);
  ctx.fill();

  // Cannon (rotated with turret)
  ctx.save();
  ctx.translate(0, -10);
  const ta = p.f < 0 ? Math.PI - p.ta : p.ta;
  ctx.rotate(ta);
  const hasMega = p.up.has('mega');
  const cLen = hasMega ? 42 : 24;
  const cW = hasMega ? 10 : 6;
  ctx.fillStyle = flash ? '#fff' : '#222';
  ctx.fillRect(0, -cW/2, cLen, cW);
  if (hasMega) {
    // Mega cannon tip with glow
    ctx.fillStyle = flash ? '#fff' : '#444';
    ctx.fillRect(cLen - 6, -cW/2 - 3, 6, cW + 6);
    ctx.fillStyle = '#ffdd40';
    ctx.fillRect(cLen - 3, -4, 2, 8);
    // glow at tip
    ctx.fillStyle = `rgba(255,220,80,${0.4 + Math.sin(t*0.3)*0.2})`;
    ctx.beginPath(); ctx.arc(cLen, 0, 6, 0, Math.PI*2); ctx.fill();
  }
  if (p.up.has('rate') && !hasMega) {
    // Second barrel
    ctx.fillStyle = flash ? '#fff' : '#222';
    ctx.fillRect(0, cW/2 + 1, cLen - 2, 3);
  }
  ctx.restore();

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.life / 25);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawVignette() {
  const grd = ctx.createRadialGradient(W/2, H/2, 200, W/2, H/2, 500);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

function drawMiniHints() {
  // Show objective arrow toward tree if offscreen right
  if (tree.dead) return;
  const treeScreenX = tree.x - camera.x;
  if (treeScreenX > W - 50) {
    ctx.save();
    ctx.globalAlpha = 0.7 + Math.sin(t*0.1)*0.2;
    ctx.fillStyle = '#2a6a22';
    ctx.beginPath();
    ctx.moveTo(W - 18, H/2 - 20);
    ctx.lineTo(W - 2, H/2);
    ctx.lineTo(W - 18, H/2 + 20);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('GREAT TREE', W - 26, H/2 + 4);
    ctx.restore();
  }
  // Shop arrow if off-screen left
  const shopScreenX = shopZone.x - camera.x;
  if (shopScreenX < -60) {
    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#ffa500';
    ctx.beginPath();
    ctx.moveTo(18, H/2 - 20);
    ctx.lineTo(2, H/2);
    ctx.lineTo(18, H/2 + 20);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SHOP', 26, H/2 + 4);
    ctx.restore();
  }
}

// ===== Loop =====
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ===== Restart =====
window.restartGame = function() { init(); };

// ===== Start =====
init();
loop();
})();
</script>
